/* ── helpers ── */
function isAutoTime() { const h = new Date().getHours(); return h >= 20 || h < 7; }
function timeToMins(str) { const [h,m] = str.split(":").map(Number); return h*60+m; }
function minsToTime(mins) {
  const t = ((mins % 1440) + 1440) % 1440;
  return `${String(Math.floor(t/60)).padStart(2,"0")}:${String(t%60).padStart(2,"0")}`;
}
function nowTime() {
  const n = new Date();
  return `${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`;
}
function fmtDur(mins) {
  const h = Math.floor(mins/60), m = mins%60;
  return h > 0 ? (m > 0 ? `${h}h ${m}m` : `${h}h`) : `${m}m`;
}

/* Slider field */
function SliderField({label, value, min, max, step=5, onChange, color, T, display, subleft, subright}) {
  const pct = ((value-min)/(max-min))*100;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:4,flex:1,minWidth:130}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
        <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase",color:T.sub}}>{label}</div>
        <div style={{fontSize:13,fontWeight:700,color,fontFamily:"'DM Mono',monospace"}}>{display}</div>
      </div>
      <input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(Number(e.target.value))}
        style={{accentColor:color,
          background:`linear-gradient(to right,${color} 0%,${color} ${pct}%,${T.prog} ${pct}%,${T.prog} 100%)`}}/>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:T.muted}}>
        <span>{subleft}</span><span>{subright}</span>
      </div>
    </div>
  );
}

function App() {

  const T = dark ? D : L;

  useEffect(()=>{
    const id = setInterval(()=>{
      const next = isAutoTime();
      setAutoTime(prev=>{ if(prev!==next) setManualDark(null); return next; });
    }, 30000);
    return ()=>clearInterval(id);
  },[]);

  // ── time state
  const [anchor,       setAnchor]       = useState("bed");    // "bed" | "wake"
  const [bedTime,      setBedTime]      = useState("22:30");  // Schlafenszeit
  const [wakeTime,     setWakeTime]     = useState("07:30");  // Aufwachzeit
  const [sleepDurH,    setSleepDurH]    = useState(9);        // Bettzeit Stunden
  const [sleepDurM,    setSleepDurM]    = useState(0);        // Bettzeit Minuten
  const [routineStart, setRoutineStart] = useState(-90);      // mins before bedTime
  const [showerOn,     setShowerOn]     = useState(true);

  // derive: if anchor=bed, wakeTime is derived; if anchor=wake, bedTime is derived
  const sleepDurMins = sleepDurH*60 + sleepDurM;
  const bedMins  = anchor==="bed"  ? timeToMins(bedTime)  : ((timeToMins(wakeTime) - sleepDurMins + 1440) % 1440);
  const wakeMins = anchor==="wake" ? timeToMins(wakeTime) : ((timeToMins(bedTime)  + sleepDurMins) % 1440);
  const derivedBed  = minsToTime(bedMins);
  const derivedWake = minsToTime(wakeMins);

  // Routine timing
  const routineStartMins = bedMins + routineStart; // abs mins
  const routineSpanMins  = -routineStart;           // how long routine lasts
  const routineStartStr  = minsToTime(routineStartMins);

  // Block time: scale baseOff (0=-1..0) across routineSpanMins
  const blockTime = (baseOff) => {
    if (baseOff === 0) return derivedBed;
    const mins = bedMins + Math.round(baseOff * routineSpanMins);
    return minsToTime(mins);
  };

  const [tab,       setTab]       = useState("timeline");
  const [expanded,  setExpanded]  = useState({});
  const [done,      setDone]      = useState({});
  const [suppFilter,setSuppFilter]= useState("all");
  const [collapsed, setCollapsed] = useState(false);
  const [liveClock, setLiveClock] = useState(new Date());

  const toggle     = id => setExpanded(p=>({...p,[id]:!p[id]}));
  const toggleDone = id => setDone(p=>({...p,[id]:!p[id]}));

  // Live clock – ticks every second
  useEffect(()=>{
    const id = setInterval(()=>setLiveClock(new Date()), 1000);
    return ()=>clearInterval(id);
  },[]);

  const BLOCKS = BASE_BLOCKS.filter(b => b.id !== "shower" || showerOn);
  const doneCount = BLOCKS.filter(b=>done[b.id]).length;
  const filteredSupps = SUPPS.filter(s=>suppFilter==="all"||s.time===suppFilter);

  const sleepH_ = Math.floor(sleepDurMins/60), sleepM_ = sleepDurMins%60;
  const sleepColor = sleepH_>=8?"#1A9862":sleepH_>=7?"#D4A017":"#C0392B";
  const sleepLabel = sleepH_>=8?"optimal":sleepH_>=7?"gut":"zu kurz";

  // Live clock strings
  const clockStr = liveClock.toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit',second:'2-digit'});

  // Countdown to bedtime in seconds
  const nowTotalSecs = liveClock.getHours()*3600 + liveClock.getMinutes()*60 + liveClock.getSeconds();
  const bedTotalSecs = bedMins * 60;
  let diffSecs = bedTotalSecs - nowTotalSecs;
  if (diffSecs < 0) diffSecs += 86400; // next day
  const cdH = Math.floor(diffSecs/3600);
  const cdM = Math.floor((diffSecs%3600)/60);
  const cdS = diffSecs%60;
  const countdownStr = `${String(cdH).padStart(2,'0')}:${String(cdM).padStart(2,'0')}:${String(cdS).padStart(2,'0')}`;
  const countdownLabel = diffSecs < 3600 ? "⚠️ Bald Bettzeit!" : diffSecs < 7200 ? "Bald schlafen" : "bis Bettzeit";
  const countdownColor = diffSecs < 1800 ? "#C0392B" : diffSecs < 3600 ? "#D4A017" : "#1A9862";

  const setNow = () => setRoutineStart(timeToMins(nowTime()) - bedMins <= 0
    ? timeToMins(nowTime()) - bedMins
    : timeToMins(nowTime()) - bedMins - 1440);

  return (
    <div style={{fontFamily:"'DM Sans',sans-serif",minHeight:"100vh",background:T.bg,color:T.text,transition:"background 0.4s,color 0.3s"}}>

      {/* ── HEADER ── */}
      <div style={{background:T.hdr,borderBottom:`1px solid ${T.hdrB}`,position:"sticky",top:0,zIndex:100,
        boxShadow:dark?"0 2px 24px rgba(0,0,0,0.55)":"0 2px 12px rgba(0,0,0,0.07)",transition:"background 0.4s,border 0.3s"}}>
        <div style={{maxWidth:860,margin:"0 auto",padding:"14px 16px 0"}}>

          {/* title row */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:collapsed?10:14,flexWrap:"wrap",gap:10}}>
            <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
              <div>
                <h1 style={{fontFamily:"'DM Serif Display',serif",fontSize:22,color:T.text}}>{dark?"🌑":"🌙"} Abendroutine</h1>
              </div>
              {/* Live clock */}
              <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:22,fontWeight:600,color:T.text,letterSpacing:"0.04em",lineHeight:1}}>{clockStr}</div>
                <div style={{fontSize:10,color:T.muted,marginTop:2,letterSpacing:"0.05em",textTransform:"uppercase"}}>Jetzt</div>
              </div>
              {/* Countdown */}
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",background:T.ctrl,border:`1.5px solid ${T.ctrlB}`,borderRadius:10,padding:"5px 12px"}}>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:20,fontWeight:700,color:countdownColor,letterSpacing:"0.04em",lineHeight:1}}>{countdownStr}</div>
                <div style={{fontSize:10,color:countdownColor,marginTop:2,fontWeight:600,letterSpacing:"0.04em"}}>{countdownLabel}</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {/* Collapse toggle */}
              <button onClick={()=>setCollapsed(c=>!c)}
                style={{padding:"6px 13px",borderRadius:9,border:`1.5px solid ${T.ctrlB}`,background:"transparent",
                  color:T.sub,fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:600,cursor:"pointer",
                  display:"flex",alignItems:"center",gap:5,transition:"all 0.15s"}}
                title={collapsed?"Einstellungen einblenden":"Einstellungen einklappen"}>
                {collapsed?"⚙️ Einstellungen":"✕ Einklappen"}
              </button>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:11,color:T.sub,fontWeight:600,letterSpacing:"0.04em"}}>{dark?"DARK":"LIGHT"}</div>
                  <div style={{fontSize:9,color:T.muted}}>{manualDark===null?"auto":"manuell"}</div>
                </div>
                <DarkToggle dark={dark} onToggle={()=>setManualDark(!dark)}/>
              </div>
            </div>
          </div>

          {/* ── TIME CONTROLS (collapsible) ── */}
          {!collapsed && (
          <div style={{background:T.ctrl,border:`1px solid ${T.ctrlB}`,borderRadius:14,padding:"16px 18px",marginBottom:14,transition:"background 0.4s,border 0.3s"}}>

            {/* Row 1: Anchor + Schlafenszeit + Aufwachzeit + Bettzeit */}
            <div style={{display:"flex",alignItems:"flex-end",gap:14,flexWrap:"wrap"}}>

              {/* Anchor toggle */}
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase",color:T.sub}}>Festlegen</div>
                <div style={{display:"flex",borderRadius:9,overflow:"hidden",border:`1.5px solid ${T.ctrlB}`}}>
                  <button onClick={()=>setAnchor("bed")}
                    style={{padding:"7px 13px",fontSize:12,fontWeight:700,border:"none",cursor:"pointer",
                      background:anchor==="bed"?T.bedAct:"transparent",
                      color:anchor==="bed"?"#fff":T.sub,transition:"background 0.2s",whiteSpace:"nowrap"}}>
                    🌙 Schlafenszeit
                  </button>
                  <button onClick={()=>setAnchor("wake")}
                    style={{padding:"7px 13px",fontSize:12,fontWeight:700,border:"none",cursor:"pointer",
                      background:anchor==="wake"?T.wakeAct:"transparent",
                      color:anchor==="wake"?"#fff":T.sub,transition:"background 0.2s",whiteSpace:"nowrap"}}>
                    ☀️ Aufwachzeit
                  </button>
                </div>
              </div>

              <div style={{width:1,background:T.sep,height:48,alignSelf:"center"}}/>

              {/* Schlafenszeit */}
              {anchor==="bed"
                ? <TimeField label="Schlafenszeit" value={bedTime} onChange={setBedTime} color="#4A8FD0" T={T}/>
                : <div style={{display:"flex",flexDirection:"column",gap:3}}>
                    <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase",color:T.muted}}>Schlafenszeit</div>
                    <div style={{fontSize:20,fontWeight:600,fontFamily:"'DM Mono',monospace",color:T.muted,padding:"6px 0"}}>{derivedBed}</div>
                  </div>
              }

              <div style={{display:"flex",alignItems:"center",alignSelf:"flex-end",paddingBottom:8,color:T.muted,fontSize:14}}>→</div>

              {/* Aufwachzeit */}
              {anchor==="wake"
                ? <TimeField label="Aufwachzeit" value={wakeTime} onChange={setWakeTime} color="#1A9862" T={T}/>
                : <div style={{display:"flex",flexDirection:"column",gap:3}}>
                    <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase",color:T.muted}}>Aufwachzeit</div>
                    <div style={{fontSize:20,fontWeight:600,fontFamily:"'DM Mono',monospace",color:"#1A9862",padding:"6px 0"}}>{derivedWake}</div>
                  </div>
              }

              <div style={{width:1,background:T.sep,height:48,alignSelf:"center"}}/>

              {/* Bettzeit (Dauer) */}
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase",color:T.sub}}>Bettzeit</div>
                <div style={{display:"flex",alignItems:"center",gap:4,background:T.timeBg,border:`1.5px solid ${T.timeB}`,borderRadius:10,padding:"6px 12px"}}>
                  <input type="number" min={4} max={12} value={sleepDurH} onChange={e=>setSleepDurH(Number(e.target.value))}
                    style={{width:28,fontSize:20,color:sleepColor,fontFamily:"'DM Mono',monospace",fontWeight:600,
                      border:"none",outline:"none",background:"transparent",cursor:"pointer",textAlign:"center"}}/>
                  <span style={{fontSize:12,color:T.sub,fontWeight:500}}>h</span>
                  <input type="number" min={0} max={59} step={15} value={sleepDurM} onChange={e=>setSleepDurM(Number(e.target.value))}
                    style={{width:24,fontSize:20,color:sleepColor,fontFamily:"'DM Mono',monospace",fontWeight:600,
                      border:"none",outline:"none",background:"transparent",cursor:"pointer",textAlign:"center"}}/>
                  <span style={{fontSize:12,color:T.sub,fontWeight:500}}>m</span>
                </div>
                <div style={{fontSize:10,fontWeight:700,color:sleepColor,textAlign:"center"}}>{sleepLabel}</div>
              </div>
            </div>

            {/* Divider */}
            <div style={{height:1,background:T.sep,margin:"14px 0"}}/>

            {/* Row 2: Start Routine */}
            <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:200}}>
                <SliderField
                  label="Start Abendroutine"
                  value={routineStart} min={-180} max={-20} step={5}
                  onChange={setRoutineStart}
                  color="#3D5A80" T={T}
                  display={routineStartStr}
                  subleft="3h vorher" subright="20 Min"
                />
              </div>
              <button onClick={setNow}
                style={{flexShrink:0,padding:"7px 14px",borderRadius:9,border:`1.5px solid ${T.nowBtn}`,
                  background:"transparent",color:T.nowBtn,fontFamily:"'DM Sans',sans-serif",
                  fontSize:12,fontWeight:600,cursor:"pointer",transition:"all 0.15s",
                  display:"flex",alignItems:"center",gap:5}}
                onMouseOver={e=>{e.currentTarget.style.background=T.nowBtn;e.currentTarget.style.color="#fff";}}
                onMouseOut={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=T.nowBtn;}}>
                ⏱ Jetzt
              </button>
              <div style={{fontSize:12,color:T.sub}}>
                Routine: <strong style={{color:"#3D5A80",fontFamily:"'DM Mono',monospace"}}>{routineStartStr}</strong>
                {" – "}
                <strong style={{color:"#4A8FD0",fontFamily:"'DM Mono',monospace"}}>{derivedBed}</strong>
                {" · "}
                <span style={{color:T.sub}}>{fmtDur(routineSpanMins)}</span>
                {!showerOn && <span style={{marginLeft:6,fontSize:11,color:T.muted,background:T.prog,padding:"1px 7px",borderRadius:99}}>ohne Dusche</span>}
              </div>
            </div>
          </div>
          )} {/* end collapsible */}

          {/* Collapsed summary */}
          {collapsed && (
            <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10,alignItems:"center"}}>
              <div style={{fontSize:12,color:T.sub,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <span>🌙 <strong style={{fontFamily:"'DM Mono',monospace",color:"#4A8FD0"}}>{derivedBed}</strong></span>
                <span style={{color:T.muted}}>·</span>
                <span>☀️ <strong style={{fontFamily:"'DM Mono',monospace",color:"#1A9862"}}>{derivedWake}</strong></span>
                <span style={{color:T.muted}}>·</span>
                <span>⏱ Start <strong style={{fontFamily:"'DM Mono',monospace",color:"#3D5A80"}}>{routineStartStr}</strong></span>
                <span style={{color:T.muted}}>·</span>
                <span style={{color:sleepColor,fontWeight:600}}>{fmtDur(sleepDurMins)} Schlaf</span>
              </div>
            </div>
          )}

          {/* Tabs */}
          <div style={{display:"flex",gap:2}}>
            {[["timeline","⏱ Timeline"],["move","🧘 Bewegung"],["supps","💊 Supplements"]].map(([id,label])=>(
              <button key={id} onClick={()=>setTab(id)}
                style={{padding:"8px 16px",fontSize:13,fontWeight:600,border:"none",cursor:"pointer",
                  borderRadius:"8px 8px 0 0",
                  background:tab===id?T.tabAct:"transparent",
                  color:tab===id?"#fff":T.sub,transition:"background 0.2s,color 0.2s"}}>{label}</button>
            ))}
          </div>
        </div>
      </div>

      {/* ── BODY ── */}
      <div style={{maxWidth:860,margin:"0 auto",padding:"20px 16px 60px"}}>

        {/* TIMELINE */}
        {tab==="timeline" && (
          <div className="tab-anim">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div style={{fontSize:13,color:T.sub}}>
                {doneCount}/{BLOCKS.length} erledigt
              </div>
            </div>
            <div style={{background:T.prog,borderRadius:99,height:4,marginBottom:18,overflow:"hidden"}}>
              <div style={{height:"100%",borderRadius:99,background:"#1A9862",width:`${(doneCount/BLOCKS.length)*100}%`,transition:"width 0.4s"}}/>
            </div>

            {sleepH_<8 && (
              <div style={{background:T.tipBg,border:`1px solid ${T.tipB}`,borderRadius:10,padding:"10px 14px",fontSize:13,color:T.tipC,marginBottom:14}}>
                ⚡ <strong>Tipp:</strong> Mit {sleepH_}h {sleepM_}m Schlaf liegst du unter dem Optimum. Früher ins Bett!
              </div>
            )}

            {BLOCKS.map((b)=>{
              const t=blockTime(b.baseOff), isOpen=expanded[b.id], isDone=done[b.id];
              return (
                <div key={b.id} style={{
                  background:T.card(b.light,isDone),
                  border:`2px solid ${T.cardB(b.accent,isDone,b.highlight)}`,
                  borderRadius:14,marginBottom:10,overflow:"hidden",opacity:isDone?0.55:1,
                  boxShadow:b.highlight?`0 2px 14px ${b.accent}${dark?"44":"22"}`:"none",
                  transition:"background 0.4s,border 0.3s,opacity 0.2s"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer"}} onClick={()=>toggle(b.id)}>
                    <button style={{width:26,height:26,borderRadius:"50%",border:`2px solid ${isDone?b.accent:T.muted}`,
                      background:isDone?b.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",
                      color:"#fff",fontSize:12,cursor:"pointer",flexShrink:0,transition:"all 0.15s"}}
                      onClick={e=>{e.stopPropagation();toggleDone(b.id);}}>{isDone&&"✓"}</button>
                    <div style={{background:b.accent+"22",color:b.accent,fontSize:12,fontWeight:700,
                      padding:"3px 9px",borderRadius:99,flexShrink:0,fontFamily:"monospace"}}>{t}</div>
                    <div style={{fontSize:18,flexShrink:0}}>{b.emoji}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:6}}>
                        <span style={{fontWeight:600,fontSize:14,color:T.text}}>{b.title}</span>
                        {b.highlight&&<span style={{fontSize:10,background:b.accent,color:"#fff",padding:"2px 8px",borderRadius:99,fontWeight:700}}>Wichtig</span>}
                      </div>
                      <div style={{fontSize:12,color:T.sub,marginTop:1}}>{b.short}</div>
                    </div>
                    {/* Dusche toggle inline */}
                    {b.hasToggle && (
                      <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0,marginRight:4}} onClick={e=>e.stopPropagation()}>
                        <span style={{fontSize:11,color:showerOn?"#0097A7":T.muted,fontWeight:600}}>{showerOn?"Ein":"Aus"}</span>
                        <Toggle on={showerOn} onChange={setShowerOn} colorOn="#0097A7" T={T}/>
                      </div>
                    )}
                    {b.dur>0&&<div style={{fontSize:11,color:T.muted,flexShrink:0,marginRight:4}}>{b.dur} Min</div>}
                    <div style={{fontSize:10,color:T.muted}}>{isOpen?"▲":"▼"}</div>
                  </div>
                  {isOpen&&(
                    <div style={{padding:"0 14px 12px",borderTop:`1px solid ${b.accent}${dark?"33":"20"}`}}>
                      <p style={{fontSize:13,color:T.text,lineHeight:1.75,marginTop:10,whiteSpace:"pre-line",opacity:dark?0.8:0.9}}>{b.detail}</p>
                      <div style={{marginTop:10,background:T.sci,borderRadius:8,padding:"7px 11px",fontSize:12,color:T.sub,fontStyle:"italic"}}>📚 {b.science}</div>
                    </div>
                  )}
                </div>
              );
            })}

            {/* Wake card */}
            <div style={{background:T.wkBg,border:`2px solid ${T.wkB}`,borderRadius:14,padding:14,marginTop:14}}>
              <div style={{fontFamily:"'DM Serif Display',serif",fontSize:16,color:T.wkTitle}}>☀️ {derivedWake} – Aufstehen & Morgen-Supplements</div>
              <div style={{fontSize:13,color:T.wkText,marginTop:8,lineHeight:1.7}}>
                <strong>Nüchtern (sofort):</strong> Eisen + Vitamin C (30 Min vor Essen warten)<br/>
                <strong>Zum Frühstück:</strong> Vitamin B-Komplex · Creatin (5g)<br/>
                <strong>Zur Mahlzeit mit Fett:</strong> Vitamin D3/K2
              </div>
            </div>
          </div>
        )}

        {/* BEWEGUNG */}
        {tab==="move" && (
          <div className="tab-anim">
            <div style={{background:T.infoWBg,border:`1px solid ${T.infoWB}`,borderRadius:12,padding:"12px 14px",marginBottom:18,fontSize:13,color:T.infoWC,lineHeight:1.6}}>
              <strong>⚠️ Knieödem-Hinweis:</strong> Kein direktes Foam Rolling auf dem Kniegelenk! Bei Schmerzen sofort aufhören.
            </div>
            {[["foam","🔵 Foam Rolling","~13 Min · langsam und kontrolliert"],
              ["stretch","🟢 Stretching","~15 Min · statisch halten, tief atmen"]].map(([type,title,sub],si)=>(
              <div key={type} style={{marginTop:si>0?22:0}}>
                <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:T.text,marginBottom:3}}>{title}</div>
                <div style={{fontSize:12,color:T.sub,marginBottom:14}}>{sub}</div>
                {EX.filter(e=>e.t===type).map((ex,i)=>{
                  const key=type[0]+i;
                  return (
                    <div key={key} style={{background:T.exBg(ex.w),border:`1px solid ${T.exB(ex.w)}`,borderRadius:12,marginBottom:8,overflow:"hidden",transition:"background 0.4s"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 13px",cursor:"pointer"}} onClick={()=>toggle(key)}>
                        <div style={{fontSize:18}}>{ex.e}</div>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:600,fontSize:14,color:T.text}}>{ex.n}</div>
                          <div style={{fontSize:11,color:T.sub}}>{ex.d} · {ex.s}</div>
                        </div>
                        {ex.w&&<div style={{fontSize:10,background:T.warnBg,color:T.warnC,padding:"2px 8px",borderRadius:99,fontWeight:700,flexShrink:0}}>⚠️ Knie</div>}
                        <div style={{fontSize:10,color:T.muted,marginLeft:6}}>{expanded[key]?"▲":"▼"}</div>
                      </div>
                      {expanded[key]&&(
                        <div style={{padding:"0 13px 11px",borderTop:`1px solid ${T.exBodyB}`}}>
                          <p style={{fontSize:13,color:T.text,lineHeight:1.7,marginTop:8,opacity:dark?0.8:0.9}}>{ex.i}</p>
                          {ex.warn&&<div style={{marginTop:8,background:T.warnBg,borderRadius:8,padding:"7px 11px",fontSize:12,color:T.warnC}}>{ex.warn}</div>}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}
            <div style={{background:T.shortBg,border:`1px solid ${T.shortB}`,borderRadius:10,padding:"10px 14px",fontSize:13,color:T.shortC,marginTop:14}}>
              <strong>⚡ Routine kürzen auf 20 Min?</strong><br/>
              Quadrizeps FR → IT-Band FR → Wadenstretch → Hüftbeuger → Taubenpose → Kindpose.
            </div>
          </div>
        )}

        {/* SUPPLEMENTS */}
        {tab==="supps" && (
          <div className="tab-anim">
            <div style={{background:T.errBg,border:`1px solid ${T.errB}`,borderRadius:12,padding:"12px 14px",marginBottom:14,fontSize:13,color:T.errC,lineHeight:1.6}}>
              <strong>⚠️ Wichtigste Interaktion:</strong> Eisen (morgens) und Zink (abends) <strong>NIEMALS zusammen</strong> – mindestens 6h Abstand!
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
              {[["all","Alle"],["morning","☀️ Morgens"],["dinner","🍽️ Abendessen"],["bed","🌙 Vor Schlaf"]].map(([id,label])=>(
                <button key={id} onClick={()=>setSuppFilter(id)}
                  style={{padding:"6px 13px",fontSize:12,fontWeight:600,borderRadius:99,
                    border:`1px solid ${suppFilter===id?T.filterAct:"#aaa"}`,
                    background:suppFilter===id?T.filterAct:"transparent",
                    color:suppFilter===id?"#fff":T.sub,cursor:"pointer",transition:"all 0.15s"}}>{label}</button>
              ))}
            </div>
            {filteredSupps.map((sp,i)=>{
              const key="sp"+i, isOpen=expanded[key];
              const bg = dark ? "#2A2A26" : sp.light||"#fff";
              return (
                <div key={key} style={{background:bg,border:`2px solid ${sp.acc+(dark?"44":"30")}`,borderRadius:14,marginBottom:10,overflow:"hidden",
                  boxShadow:sp.p?`0 2px 10px ${sp.acc}${dark?"44":"18"}`:"none",transition:"background 0.4s"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer"}} onClick={()=>toggle(key)}>
                    <div style={{fontSize:22,flexShrink:0}}>{sp.e}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <span style={{fontWeight:600,fontSize:14,color:T.text}}>{sp.n}</span>
                        {sp.p&&<span style={{fontSize:10,background:sp.acc,color:"#fff",padding:"2px 8px",borderRadius:99,fontWeight:700}}>Priorität</span>}
                      </div>
                      <div style={{fontSize:12,color:T.sub,marginTop:1}}>{sp.dose}</div>
                    </div>
                    <div style={{fontSize:11,fontWeight:700,background:sp.acc+(dark?"33":"20"),color:sp.acc,padding:"3px 9px",borderRadius:99,flexShrink:0}}>{sp.badge}</div>
                    <div style={{fontSize:10,color:T.muted,marginLeft:6}}>{isOpen?"▲":"▼"}</div>
                  </div>
                  {isOpen&&(
                    <div style={{padding:"0 14px 12px",borderTop:`1px solid ${dark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.06)"}`}}>
                      <div style={{marginTop:10}}>
                        <div style={{fontSize:10,fontWeight:700,color:T.sub,letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:3}}>Wann & Wie</div>
                        <div style={{fontSize:13,color:T.text,opacity:dark?0.8:0.9}}>{sp.when}</div>
                      </div>
                      <div style={{marginTop:10}}>
                        <div style={{fontSize:10,fontWeight:700,color:T.sub,letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:3}}>Warum</div>
                        <div style={{fontSize:13,color:T.text,lineHeight:1.7,opacity:dark?0.8:0.9}}>{sp.why}</div>
                      </div>
                      <div style={{marginTop:10,background:sp.cw?T.warnBg:T.okBg,borderRadius:8,padding:"8px 11px",fontSize:12,color:sp.cw?T.warnC:T.okC}}>
                        {sp.cw?"⚠️ ":"✅ "}{sp.compat}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
