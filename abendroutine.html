function isAutoTime() {
  const h = new Date().getHours();
  return h >= 20 || h < 7;
}

function timeToMins(str){const[h,m]=str.split(":").map(Number);return h*60+m;}
function minsToTime(mins){const t=((mins%1440)+1440)%1440;return`${String(Math.floor(t/60)).padStart(2,"0")}:${String(t%60).padStart(2,"0")}`;}

/* ── TOGGLE BUTTON ───────────────────────────────────────────────── */
function DarkToggle({dark, onToggle}) {
  const [anim, setAnim] = useState(false);
  const handle = () => { setAnim(true); onToggle(); setTimeout(()=>setAnim(false), 500); };
  return (
    <button onClick={handle} title={dark?"Light Mode":"Dark Mode"}
      style={{ position:"relative", width:58, height:30, borderRadius:99, border:"none", cursor:"pointer",
        background: dark ? "#4A6FA0" : "#D8D5CC",
        transition:"background 0.4s", flexShrink:0, boxShadow: dark?"0 0 12px #4A6FA044":"none" }}>
      {/* Stars (dark) or Sun rays (light) track decoration */}
      <span style={{ position:"absolute", left: dark?"8px":"auto", right: dark?"auto":"8px",
        top:"50%", transform:"translateY(-50%)", fontSize:11, opacity:0.7, pointerEvents:"none",
        transition:"opacity 0.3s" }}>
        {dark ? "✦" : "☀"}
      </span>
      {/* Knob */}
      <div style={{ position:"absolute", top:4,
        left: dark ? 30 : 4,
        width:22, height:22, borderRadius:"50%",
        background: dark ? "#E8E6DE" : "#fff",
        boxShadow:"0 1px 5px rgba(0,0,0,0.3)",
        transition:"left 0.35s cubic-bezier(0.34,1.56,0.64,1), background 0.4s",
        display:"flex", alignItems:"center", justifyContent:"center", fontSize:13 }}>
        <span className={anim ? (dark?"icon-spin":"icon-spinr") : ""}>
          {dark ? "🌙" : "☀️"}
        </span>
      </div>
    </button>
  );
}

/* ── APP ─────────────────────────────────────────────────────────── */
function App() {
  const [manualDark,  setManualDark]  = useState(null);        // null = follow auto
  const [autoTime,    setAutoTime]    = useState(isAutoTime()); // rechecked every 30s
  const dark = manualDark !== null ? manualDark : autoTime;

  // Auto dark: on 20:00–07:00. Crossing a boundary resets any manual override.
  useEffect(() => {
    const id = setInterval(() => {
      const next = isAutoTime();
      setAutoTime(prev => {
        if (prev !== next) setManualDark(null); // boundary crossed → back to auto
        return next;
      });
    }, 30000);
    return () => clearInterval(id);
  }, []);
  const [mode,       setMode]       = useState("bed");
  const [bedTime,    setBedTime]    = useState("22:30");
  const [wakeTime,   setWakeTime]   = useState("08:00");
  const [sleepGoalH, setSleepGoalH] = useState(9);
  const [sleepGoalM, setSleepGoalM] = useState(0);
  const [tab,        setTab]        = useState("timeline");
  const [expanded,   setExpanded]   = useState({});
  const [done,       setDone]       = useState({});
  const [suppFilter, setSuppFilter] = useState("all");

  const T = dark ? D : L;

  const sleepGoalMins   = sleepGoalH*60+sleepGoalM;
  const bedMins         = mode==="bed"  ? timeToMins(bedTime)  : ((timeToMins(wakeTime)-sleepGoalMins+1440)%1440);
  const wakeMins        = mode==="wake" ? timeToMins(wakeTime) : ((timeToMins(bedTime) +sleepGoalMins)%1440);
  const displayBed      = minsToTime(bedMins);
  const displayWake     = minsToTime(wakeMins);
  const sleepDur        = ((wakeMins-bedMins+1440)%1440);
  const sleepH          = Math.floor(sleepDur/60);
  const sleepM_         = sleepDur%60;
  const blockTime       = (off) => minsToTime(bedMins+off);
  const toggle          = (id)  => setExpanded(p=>({...p,[id]:!p[id]}));
  const toggleDoneF     = (id)  => setDone(p=>({...p,[id]:!p[id]}));
  const filteredSupps   = SUPPS.filter(s=>suppFilter==="all"||s.time===suppFilter);
  const doneCount       = BLOCKS.filter(b=>done[b.id]).length;
  const sleepColor      = sleepH>=8?"#1A9862":sleepH>=7?"#D4A017":"#C0392B";
  const sleepLabel      = sleepH>=8?"optimal":sleepH>=7?"gut":"zu kurz";

  const inp = (color) => ({fontSize:19,fontWeight:700,color,background:"transparent",border:"none",outline:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",width:78});

  return (
    <div style={{fontFamily:"'DM Sans',sans-serif",minHeight:"100vh",background:T.bg,color:T.text,transition:"background 0.4s,color 0.3s"}}>

      {/* HEADER */}
      <div style={{background:T.hdrBg,borderBottom:`1px solid ${T.hdrBorder}`,position:"sticky",top:0,zIndex:100,
        boxShadow:dark?"0 2px 24px rgba(0,0,0,0.6)":"0 2px 12px rgba(0,0,0,0.07)",transition:"background 0.4s,border 0.3s"}}>
        <div style={{maxWidth:800,margin:"0 auto",padding:"14px 16px 0"}}>

          {/* Title + controls row */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:14}}>
            <div>
              <h1 style={{fontFamily:"'DM Serif Display',serif",fontSize:22,color:T.text,transition:"color 0.3s"}}>
                {dark?"🌑":"🌙"} Abendroutine
              </h1>
              <p style={{fontSize:12,color:T.sub,marginTop:2}}>Wissenschaftlich fundiert · 88 kg · 24 J · Kniefokus</p>
            </div>

            <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>

              {/* Dark mode toggle */}
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:11,color:T.sub,fontWeight:600,letterSpacing:"0.04em"}}>{dark?"DARK":"LIGHT"}</div>
                  <div style={{fontSize:9,color:T.muted,marginTop:1}}>{manualDark===null?"auto":"manuell"}</div>
                </div>
                <DarkToggle dark={dark} onToggle={()=>setManualDark(!dark)} />
              </div>

              {/* Time control box */}
              <div style={{display:"flex",alignItems:"center",gap:10,background:T.ctrlBg,borderRadius:12,padding:"8px 14px",border:`1px solid ${T.ctrlBorder}`,flexWrap:"wrap",transition:"background 0.4s,border 0.3s"}}>
                {/* Mode */}
                <div>
                  <div style={{fontSize:10,color:T.sub,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase"}}>Modus</div>
                  <div style={{display:"flex",borderRadius:7,overflow:"hidden",border:`1px solid ${T.ctrlBorder}`,marginTop:3}}>
                    <button onClick={()=>setMode("bed")}  style={{padding:"4px 10px",fontSize:11,fontWeight:700,border:"none",cursor:"pointer",background:mode==="bed" ?T.modeActBed:"transparent",color:mode==="bed"?"#fff":T.sub,transition:"background 0.2s"}}>🌙 Bettzeit</button>
                    <button onClick={()=>setMode("wake")} style={{padding:"4px 10px",fontSize:11,fontWeight:700,border:"none",cursor:"pointer",background:mode==="wake"?T.modeActWake:"transparent",color:mode==="wake"?"#fff":T.sub,transition:"background 0.2s"}}>☀️ Aufwachen</button>
                  </div>
                </div>
                <div style={{width:1,background:T.sep,alignSelf:"stretch"}}/>
                {/* Bed */}
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:10,color:mode==="bed"?"#4A8FD0":T.muted,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase"}}>Bettgehzeit</div>
                  {mode==="bed"
                    ? <input type="time" value={bedTime}  onChange={e=>setBedTime(e.target.value)}  style={inp("#4A8FD0")}/>
                    : <div style={{fontSize:19,fontWeight:700,color:T.muted}}>{displayBed}</div>}
                </div>
                <div style={{color:T.muted,fontSize:16}}>→</div>
                {/* Wake */}
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:10,color:mode==="wake"?"#1A9862":T.muted,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase"}}>Aufwachen</div>
                  {mode==="wake"
                    ? <input type="time" value={wakeTime} onChange={e=>setWakeTime(e.target.value)} style={inp("#1A9862")}/>
                    : <div style={{fontSize:19,fontWeight:700,color:"#1A9862"}}>{displayWake}</div>}
                </div>
                <div style={{width:1,background:T.sep,alignSelf:"stretch"}}/>
                {/* Sleep goal */}
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:10,color:T.sub,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase"}}>Schlafdauer</div>
                  <div style={{display:"flex",alignItems:"center",gap:3,marginTop:3}}>
                    <input type="number" min={4} max={12} value={sleepGoalH} onChange={e=>setSleepGoalH(Number(e.target.value))}
                      style={{width:32,fontSize:18,fontWeight:700,color:sleepColor,border:"none",background:"transparent",outline:"none",textAlign:"center",fontFamily:"'DM Sans',sans-serif"}}/>
                    <span style={{fontSize:11,color:T.sub}}>h</span>
                    <input type="number" min={0} max={59} step={15} value={sleepGoalM} onChange={e=>setSleepGoalM(Number(e.target.value))}
                      style={{width:28,fontSize:18,fontWeight:700,color:sleepColor,border:"none",background:"transparent",outline:"none",textAlign:"center",fontFamily:"'DM Sans',sans-serif"}}/>
                    <span style={{fontSize:11,color:T.sub}}>m</span>
                  </div>
                  <div style={{fontSize:10,color:sleepColor,fontWeight:700}}>{sleepLabel}</div>
                </div>
              </div>
            </div>
          </div>

          {/* Tabs */}
          <div style={{display:"flex",gap:2}}>
            {[["timeline","⏱ Timeline"],["move","🧘 Bewegung"],["supps","💊 Supplements"]].map(([id,label])=>(
              <button key={id} onClick={()=>setTab(id)}
                style={{padding:"8px 16px",fontSize:13,fontWeight:600,border:"none",cursor:"pointer",
                  borderRadius:"8px 8px 0 0",
                  background:tab===id?T.tabActive:"transparent",
                  color:tab===id?"#fff":T.sub,transition:"background 0.2s,color 0.2s"}}>{label}</button>
            ))}
          </div>
        </div>
      </div>

      {/* BODY */}
      <div style={{maxWidth:800,margin:"0 auto",padding:"20px 16px 60px"}}>

        {/* TIMELINE */}
        {tab==="timeline" && (
          <div className="tab-anim">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div style={{fontSize:13,color:T.sub}}>Routine ab <strong style={{color:"#4A8FD0"}}>{blockTime(-150)}</strong> · ca. 2,5 Stunden</div>
              <div style={{fontSize:12,color:"#1A9862",fontWeight:600}}>{doneCount}/{BLOCKS.length} erledigt</div>
            </div>
            <div style={{background:T.progBg,borderRadius:99,height:4,marginBottom:18,overflow:"hidden"}}>
              <div style={{height:"100%",borderRadius:99,background:"#1A9862",width:`${(doneCount/BLOCKS.length)*100}%`,transition:"width 0.4s"}}/>
            </div>

            {sleepH<8 && (
              <div style={{background:T.tipBg,border:`1px solid ${T.tipBorder}`,borderRadius:10,padding:"10px 14px",fontSize:13,color:T.tipText,marginBottom:14}}>
                ⚡ <strong>Tipp:</strong> Mit {sleepH}h {sleepM_}m Schlaf liegst du unter dem Optimum. Früher ins Bett – Schlaf ist das wirksamste Recovery-Tool!
              </div>
            )}

            {BLOCKS.map((b)=>{
              const t=blockTime(b.offset), isOpen=expanded[b.id], isDone=done[b.id];
              return (
                <div key={b.id} style={{
                  background:T.cardBg(b.light,isDone),
                  border:`2px solid ${T.cardBorder(b.accent,isDone,b.highlight)}`,
                  borderRadius:14,marginBottom:10,overflow:"hidden",
                  opacity:isDone?0.6:1,
                  boxShadow:b.highlight?`0 2px 14px ${b.accent}${dark?"44":"22"}`:"none",
                  transition:"background 0.4s,border 0.3s"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer"}} onClick={()=>toggle(b.id)}>
                    <button style={{width:26,height:26,borderRadius:"50%",border:`2px solid ${isDone?b.accent:T.muted}`,background:isDone?b.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,cursor:"pointer",flexShrink:0}}
                      onClick={e=>{e.stopPropagation();toggleDoneF(b.id);}}>{isDone&&"✓"}</button>
                    <div style={{background:b.accent+"22",color:b.accent,fontSize:12,fontWeight:700,padding:"3px 9px",borderRadius:99,flexShrink:0,fontFamily:"monospace"}}>{t}</div>
                    <div style={{fontSize:18,flexShrink:0}}>{b.emoji}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:6}}>
                        <span style={{fontWeight:600,fontSize:14,color:T.text}}>{b.title}</span>
                        {b.highlight&&<span style={{fontSize:10,background:b.accent,color:"#fff",padding:"2px 8px",borderRadius:99,fontWeight:700}}>Wichtig</span>}
                      </div>
                      <div style={{fontSize:12,color:T.sub,marginTop:1}}>{b.short}</div>
                    </div>
                    {b.dur>0&&<div style={{fontSize:11,color:T.muted,flexShrink:0,marginRight:4}}>{b.dur} Min</div>}
                    <div style={{fontSize:10,color:T.muted}}>{isOpen?"▲":"▼"}</div>
                  </div>
                  {isOpen&&(
                    <div style={{padding:"0 14px 12px",borderTop:`1px solid ${b.accent}${dark?"33":"20"}`}}>
                      <p style={{fontSize:13,color:T.text,lineHeight:1.75,marginTop:10,whiteSpace:"pre-line",opacity:dark?0.8:0.9}}>{b.detail}</p>
                      <div style={{marginTop:10,background:T.sci,borderRadius:8,padding:"7px 11px",fontSize:12,color:T.sub,fontStyle:"italic"}}>📚 {b.science}</div>
                    </div>
                  )}
                </div>
              );
            })}

            <div style={{background:T.wkBg,border:`2px solid ${T.wkBorder}`,borderRadius:14,padding:14,marginTop:14,transition:"background 0.4s"}}>
              <div style={{fontFamily:"'DM Serif Display',serif",fontSize:16,color:T.wkTitle}}>☀️ {displayWake} – Aufstehen & Morgen-Supplements</div>
              <div style={{fontSize:13,color:T.wkText,marginTop:8,lineHeight:1.7}}>
                <strong>Nüchtern (sofort):</strong> Eisen + Vitamin C (30 Min vor Essen warten)<br/>
                <strong>Zum Frühstück:</strong> Vitamin B-Komplex · Creatin (5g)<br/>
                <strong>Zur Mahlzeit mit Fett:</strong> Vitamin D3/K2
              </div>
            </div>
          </div>
        )}

        {/* BEWEGUNG */}
        {tab==="move" && (
          <div className="tab-anim">
            <div style={{background:T.infoWarnBg,border:`1px solid ${T.infoWarnBorder}`,borderRadius:12,padding:"12px 14px",marginBottom:18,fontSize:13,color:T.infoWarnText,lineHeight:1.6}}>
              <strong>⚠️ Knieödem-Hinweis (Überbelastung, Marathon 2025):</strong> Kein direktes Foam Rolling auf dem Kniegelenk oder Ödembereich! Bei Schmerzen sofort aufhören. Ersetzt keine Physiotherapie.
            </div>

            {[["foam","🔵 Foam Rolling","~13 Min · langsam und kontrolliert"],
              ["stretch","🟢 Stretching","~15 Min · statisch halten, tief atmen"]].map(([type,title,sub],si)=>(
              <div key={type} style={{marginTop:si>0?22:0}}>
                <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:T.text,marginBottom:3}}>{title}</div>
                <div style={{fontSize:12,color:T.sub,marginBottom:14}}>{sub}</div>
                {EX.filter(e=>e.t===type).map((ex,i)=>{
                  const key=type[0]+i;
                  return (
                    <div key={key} style={{background:T.exBg(ex.w),border:`1px solid ${T.exBorder(ex.w)}`,borderRadius:12,marginBottom:8,overflow:"hidden",transition:"background 0.4s"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 13px",cursor:"pointer"}} onClick={()=>toggle(key)}>
                        <div style={{fontSize:18}}>{ex.e}</div>
                        <div>
                          <div style={{fontWeight:600,fontSize:14,color:T.text}}>{ex.n}</div>
                          <div style={{fontSize:11,color:T.sub}}>{ex.d} · {ex.s}</div>
                        </div>
                        {ex.w&&<div style={{marginLeft:"auto",fontSize:10,background:T.warnBg,color:T.warnColor,padding:"2px 8px",borderRadius:99,fontWeight:700,flexShrink:0}}>⚠️ Knie</div>}
                        <div style={{fontSize:10,color:T.muted,marginLeft:ex.w?6:"auto"}}>{expanded[key]?"▲":"▼"}</div>
                      </div>
                      {expanded[key]&&(
                        <div style={{padding:"0 13px 11px",borderTop:`1px solid ${T.exBodyBorder}`}}>
                          <p style={{fontSize:13,color:T.text,lineHeight:1.7,marginTop:8,opacity:dark?0.8:0.9}}>{ex.i}</p>
                          {ex.warn&&<div style={{marginTop:8,background:T.warnBg,borderRadius:8,padding:"7px 11px",fontSize:12,color:T.warnColor}}>{ex.warn}</div>}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}

            <div style={{background:T.shortBg,border:`1px solid ${T.shortBorder}`,borderRadius:10,padding:"10px 14px",fontSize:13,color:T.shortText,marginTop:14}}>
              <strong>⚡ Routine kürzen auf 20 Min?</strong><br/>
              Quadrizeps FR → IT-Band FR → Wadenstretch → Hüftbeuger → Taubenpose → Kindpose.
            </div>
          </div>
        )}

        {/* SUPPLEMENTS */}
        {tab==="supps" && (
          <div className="tab-anim">
            <div style={{background:T.errBg,border:`1px solid ${T.errBorder}`,borderRadius:12,padding:"12px 14px",marginBottom:14,fontSize:13,color:T.errText,lineHeight:1.6}}>
              <strong>⚠️ Wichtigste Interaktion:</strong> Eisen (morgens nüchtern) und Zink (abends) <strong>NIEMALS zusammen</strong> – mindestens 6h Abstand!
            </div>

            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
              {[["all","Alle"],["morning","☀️ Morgens"],["dinner","🍽️ Abendessen"],["bed","🌙 Vor Schlaf"]].map(([id,label])=>(
                <button key={id} onClick={()=>setSuppFilter(id)}
                  style={{padding:"6px 13px",fontSize:12,fontWeight:600,borderRadius:99,
                    border:`1px solid ${suppFilter===id?T.filterActiveBg:T.filterBorder}`,
                    background:suppFilter===id?T.filterActiveBg:"transparent",
                    color:suppFilter===id?T.filterActiveColor:T.filterColor,cursor:"pointer",transition:"all 0.15s"}}>{label}</button>
              ))}
            </div>

            {filteredSupps.map((sp,i)=>{
              const key="sp"+i, isOpen=expanded[key];
              const bg = dark ? "#2A2A26" : sp.light||"#fff";
              return (
                <div key={key} style={{background:bg,border:`2px solid ${sp.acc+(dark?"44":"30")}`,borderRadius:14,marginBottom:10,overflow:"hidden",
                  boxShadow:sp.p?`0 2px 10px ${sp.acc}${dark?"44":"18"}`:"none",transition:"background 0.4s"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer"}} onClick={()=>toggle(key)}>
                    <div style={{fontSize:22,flexShrink:0}}>{sp.e}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <span style={{fontWeight:600,fontSize:14,color:T.text}}>{sp.n}</span>
                        {sp.p&&<span style={{fontSize:10,background:sp.acc,color:"#fff",padding:"2px 8px",borderRadius:99,fontWeight:700}}>Priorität</span>}
                      </div>
                      <div style={{fontSize:12,color:T.sub,marginTop:1}}>{sp.dose}</div>
                    </div>
                    <div style={{marginLeft:"auto",fontSize:11,fontWeight:700,background:sp.acc+(dark?"33":"20"),color:sp.acc,padding:"3px 9px",borderRadius:99,flexShrink:0}}>{sp.badge}</div>
                    <div style={{fontSize:10,color:T.muted,marginLeft:6}}>{isOpen?"▲":"▼"}</div>
                  </div>
                  {isOpen&&(
                    <div style={{padding:"0 14px 12px",borderTop:`1px solid ${dark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.06)"}`}}>
                      <div style={{marginTop:10}}>
                        <div style={{fontSize:10,fontWeight:700,color:T.sub,letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:3}}>Wann & Wie</div>
                        <div style={{fontSize:13,color:T.text,opacity:dark?0.8:0.9}}>{sp.when}</div>
                      </div>
                      <div style={{marginTop:10}}>
                        <div style={{fontSize:10,fontWeight:700,color:T.sub,letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:3}}>Warum</div>
                        <div style={{fontSize:13,color:T.text,lineHeight:1.7,opacity:dark?0.8:0.9}}>{sp.why}</div>
                      </div>
                      <div style={{marginTop:10,background:sp.cw?T.warnBg:T.okBg,borderRadius:8,padding:"8px 11px",fontSize:12,color:sp.cw?T.warnColor:T.okColor}}>
                        {sp.cw?"⚠️ ":"✅ "}{sp.compat}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
