function timeToMins(str) {
  const [h, m] = str.split(":").map(Number);
  return h * 60 + m;
}
function minsToTime(mins) {
  const t = ((mins % 1440) + 1440) % 1440;
  return `${String(Math.floor(t / 60)).padStart(2, "0")}:${String(t % 60).padStart(2, "0")}`;
}

    exB: { padding: "0 13px 11px", borderTop: "1px solid #F0EDE7" },
    exTx: { fontSize: 13, color: "#555", lineHeight: 1.7, marginTop: 8 },
    wBox: { marginTop: 8, background: "#FEF3E2", borderRadius: 8, padding: "7px 11px", fontSize: 12, color: "#A04000" },
    fRow: { display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 },
    fBtn: (a) => ({ padding: "6px 13px", fontSize: 12, fontWeight: 600, borderRadius: 99, border: `1px solid ${a ? "#3D5A80" : "#DDD"}`, background: a ? "#3D5A80" : "#fff", color: a ? "#fff" : "#888", cursor: "pointer" }),
    spC: (sp) => ({ background: sp.light, border: `2px solid ${sp.accent}30`, borderRadius: 14, marginBottom: 10, overflow: "hidden", boxShadow: sp.priority ? `0 2px 10px ${sp.accent}18` : "none" }),
    spT: { display: "flex", alignItems: "center", gap: 10, padding: "12px 14px", cursor: "pointer" },
    spBdg: (acc) => ({ marginLeft: "auto", fontSize: 11, fontWeight: 700, background: acc + "20", color: acc, padding: "3px 9px", borderRadius: 99, flexShrink: 0 }),
    spB: { padding: "0 14px 12px", borderTop: "1px solid rgba(0,0,0,0.06)" },
    wkC: { background: "#FFFBEB", border: "2px solid #F5CBA7", borderRadius: 14, padding: 14, marginTop: 14 },
    chv: { fontSize: 10, color: "#CCC", marginLeft: "auto", flexShrink: 0 },
    sep: { width: 1, background: "#E5E2DA", alignSelf: "stretch" },
  };

  return (
    <div style={s.app}>
      <div style={s.hdr}>
        <div style={s.hIn}>
          <div style={s.tRow}>
            <div>
              <h1 style={s.h1}>🌙 Abendroutine</h1>
              <p style={s.sub}>Wissenschaftlich fundiert · 88 kg · 24 J · Kniefokus</p>
            </div>
            <div style={s.tc}>
              {/* Mode */}
              <div>
                <div style={s.tLbl}>Modus</div>
                <div style={{ display: "flex", borderRadius: 7, overflow: "hidden", border: "1px solid #E5E2DA", marginTop: 3 }}>
                  <button onClick={() => setMode("bed")} style={{ padding: "4px 10px", fontSize: 11, fontWeight: 700, border: "none", cursor: "pointer", background: mode === "bed" ? "#3D5A80" : "#fff", color: mode === "bed" ? "#fff" : "#888" }}>🌙 Bettzeit</button>
                  <button onClick={() => setMode("wake")} style={{ padding: "4px 10px", fontSize: 11, fontWeight: 700, border: "none", cursor: "pointer", background: mode === "wake" ? "#1A9862" : "#fff", color: mode === "wake" ? "#fff" : "#888" }}>☀️ Aufwachen</button>
                </div>
              </div>
              <div style={s.sep} />
              {/* Bed */}
              <div style={{ textAlign: "center" }}>
                <div style={{ ...s.tLbl, color: mode === "bed" ? "#3D5A80" : "#BBB" }}>Bettgehzeit</div>
                {mode === "bed"
                  ? <input type="time" value={bedTime} onChange={e => setBedTime(e.target.value)} style={s.tIn("#3D5A80")} />
                  : <div style={s.tSt("#AAA")}>{displayBed}</div>}
              </div>
              <div style={s.div}>→</div>
              {/* Wake */}
              <div style={{ textAlign: "center" }}>
                <div style={{ ...s.tLbl, color: mode === "wake" ? "#1A9862" : "#BBB" }}>Aufwachen</div>
                {mode === "wake"
                  ? <input type="time" value={wakeTime} onChange={e => setWakeTime(e.target.value)} style={s.tIn("#1A9862")} />
                  : <div style={s.tSt("#1A9862")}>{displayWake}</div>}
              </div>
              <div style={s.sep} />
              {/* Sleep goal */}
              <div style={{ textAlign: "center" }}>
                <div style={s.tLbl}>Schlafdauer</div>
                <div style={{ display: "flex", alignItems: "center", gap: 3, marginTop: 3 }}>
                  <input type="number" min={4} max={12} value={sleepGoalH} onChange={e => setSleepGoalH(Number(e.target.value))}
                    style={{ width: 34, fontSize: 18, fontWeight: 700, color: sleepColor, border: "none", background: "transparent", outline: "none", textAlign: "center", fontFamily: "'DM Sans', sans-serif" }} />
                  <span style={{ fontSize: 12, color: "#999" }}>h</span>
                  <input type="number" min={0} max={59} step={15} value={sleepGoalM} onChange={e => setSleepGoalM(Number(e.target.value))}
                    style={{ width: 30, fontSize: 18, fontWeight: 700, color: sleepColor, border: "none", background: "transparent", outline: "none", textAlign: "center", fontFamily: "'DM Sans', sans-serif" }} />
                  <span style={{ fontSize: 12, color: "#999" }}>m</span>
                </div>
                <div style={{ fontSize: 10, color: sleepColor, fontWeight: 700 }}>{sleepLabel}</div>
              </div>
            </div>
          </div>
          <div style={s.tabs}>
            {[["timeline", "⏱ Timeline"], ["move", "🧘 Bewegung"], ["supps", "💊 Supplements"]].map(([id, label]) => (
              <button key={id} style={s.tab(tab === id)} onClick={() => setTab(id)}>{label}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={s.body}>

        {/* TIMELINE */}
        {tab === "timeline" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
              <div style={{ fontSize: 13, color: "#999" }}>Routine ab <strong style={{ color: "#3D5A80" }}>{routineStart}</strong> · ca. 2,5 Stunden</div>
              <div style={{ fontSize: 12, color: "#1A9862", fontWeight: 600 }}>{doneCount}/{BLOCKS.length} erledigt</div>
            </div>
            <div style={s.prog}><div style={s.progF((doneCount / BLOCKS.length) * 100)} /></div>
            {sleepH < 8 && (
              <div style={s.infoB("#E8722A")}>⚡ <strong>Tipp:</strong> Mit {sleepH}h {sleepM}m Schlaf liegst du unter dem Optimum. Früher ins Bett gehen – Schlaf ist das wirksamste Recovery-Tool!</div>
            )}
            {BLOCKS.map((b) => {
              const t = blockTime(b.offset);
              const isOpen = expanded[b.id];
              const isDone = done[b.id];
              return (
                <div key={b.id} style={s.card(b.light, b.accent, isDone, b.highlight)}>
                  <div style={s.cTop} onClick={() => toggle(b.id)}>
                    <button style={s.chk(isDone, b.accent)} onClick={e => { e.stopPropagation(); toggleDone(b.id); }}>{isDone && "✓"}</button>
                    <div style={s.tPill(b.accent)}>{t}</div>
                    <div style={{ fontSize: 18, flexShrink: 0 }}>{b.emoji}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap" }}>
                        <span style={s.cTit}>{b.title}</span>
                        {b.highlight && <span style={s.hiBdg(b.accent)}>Wichtig</span>}
                      </div>
                      <div style={s.cSub}>{b.short}</div>
                    </div>
                    {b.duration > 0 && <div style={{ fontSize: 11, color: "#BBB", flexShrink: 0, marginRight: 6 }}>{b.duration} Min</div>}
                    <div style={s.chv}>{isOpen ? "▲" : "▼"}</div>
                  </div>
                  {isOpen && (
                    <div style={s.cBody(b.accent)}>
                      <p style={s.det}>{b.detail}</p>
                      <div style={s.sci}>📚 {b.science}</div>
                    </div>
                  )}
                </div>
              );
            })}
            <div style={s.wkC}>
              <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: 16, color: "#B7770D" }}>☀️ {displayWake} – Aufstehen & Morgen-Supplements</div>
              <div style={{ fontSize: 13, color: "#7D6608", marginTop: 8, lineHeight: 1.7 }}>
                <strong>Nüchtern (sofort):</strong> Eisen + Vitamin C (30 Min vor Essen warten)<br />
                <strong>Zum Frühstück:</strong> Vitamin B-Komplex · Creatin (5g)<br />
                <strong>Zur Mahlzeit mit Fett:</strong> Vitamin D3/K2
              </div>
            </div>
          </div>
        )}

        {/* BEWEGUNG */}
        {tab === "move" && (
          <div>
            <div style={{ background: "#FEF3E2", border: "1px solid #F0C896", borderRadius: 12, padding: "12px 14px", marginBottom: 18, fontSize: 13, color: "#784212", lineHeight: 1.6 }}>
              <strong>⚠️ Knieödem-Hinweis (Überbelastung, Marathon 2025):</strong> Kein direktes Foam Rolling auf dem Kniegelenk oder Ödembereich! Umliegende Strukturen entlasten. Bei Schmerzen sofort aufhören.
            </div>
            <div style={{ ...s.secT, marginBottom: 2 }}>🔵 Foam Rolling</div>
            <div style={s.secS}>~13 Minuten · Rollen mit Körpergewicht, langsam und kontrolliert</div>
            {EXERCISES.filter(e => e.type === "foam").map((ex, i) => {
              const key = "fr" + i;
              return (
                <div key={key} style={s.exC(ex.warn)}>
                  <div style={s.exT} onClick={() => toggle(key)}>
                    <div style={{ fontSize: 18 }}>{ex.emoji}</div>
                    <div><div style={s.exN}>{ex.name}</div><div style={s.exM}>{ex.duration} · {ex.side}</div></div>
                    {ex.warn && <div style={s.wTag}>⚠️ Knie</div>}
                    <div style={{ ...s.chv, marginLeft: ex.warn ? 6 : "auto" }}>{expanded[key] ? "▲" : "▼"}</div>
                  </div>
                  {expanded[key] && <div style={s.exB}><p style={s.exTx}>{ex.instruction}</p>{ex.warning && <div style={s.wBox}>{ex.warning}</div>}</div>}
                </div>
              );
            })}
            <div style={{ ...s.secT, marginTop: 22, marginBottom: 2 }}>🟢 Stretching</div>
            <div style={s.secS}>~15 Minuten · Statisch halten, tief atmen</div>
            {EXERCISES.filter(e => e.type === "stretch").map((ex, i) => {
              const key = "st" + i;
              return (
                <div key={key} style={s.exC(ex.warn)}>
                  <div style={s.exT} onClick={() => toggle(key)}>
                    <div style={{ fontSize: 18 }}>{ex.emoji}</div>
                    <div><div style={s.exN}>{ex.name}</div><div style={s.exM}>{ex.duration}</div></div>
                    {ex.warn && <div style={s.wTag}>⚠️ Knie</div>}
                    <div style={{ ...s.chv, marginLeft: ex.warn ? 6 : "auto" }}>{expanded[key] ? "▲" : "▼"}</div>
                  </div>
                  {expanded[key] && <div style={s.exB}><p style={s.exTx}>{ex.instruction}</p>{ex.warning && <div style={s.wBox}>{ex.warning}</div>}</div>}
                </div>
              );
            })}
            <div style={{ background: "#EBF5FB", border: "1px solid #AED6F1", borderRadius: 10, padding: "10px 14px", fontSize: 13, color: "#1A5276", marginTop: 14 }}>
              <strong>⚡ Routine kürzen auf 20 Min?</strong><br />
              Quadrizeps FR → IT-Band FR → Wadenstretch → Hüftbeuger-Ausfallschritt → Taubenpose → Kindpose.
            </div>
          </div>
        )}

        {/* SUPPLEMENTS */}
        {tab === "supps" && (
          <div>
            <div style={{ background: "#FDEDEC", border: "1px solid #F5B7B1", borderRadius: 12, padding: "12px 14px", marginBottom: 14, fontSize: 13, color: "#922B21", lineHeight: 1.6 }}>
              <strong>⚠️ Wichtigste Interaktion:</strong> Eisen (morgens nüchtern) und Zink (abends) <strong>NIEMALS zusammen</strong> – mindestens 6h Abstand!
            </div>
            <div style={s.fRow}>
              {[["all", "Alle"], ["morning", "☀️ Morgens"], ["dinner", "🍽️ Abendessen"], ["bed", "🌙 Vor Schlaf"]].map(([id, label]) => (
                <button key={id} style={s.fBtn(suppFilter === id)} onClick={() => setSuppFilter(id)}>{label}</button>
              ))}
            </div>
            {filteredSupps.map((sp, i) => {
              const key = "sp" + i;
              const isOpen = expanded[key];
              return (
                <div key={key} style={s.spC(sp)}>
                  <div style={s.spT} onClick={() => toggle(key)}>
                    <div style={{ fontSize: 22, flexShrink: 0 }}>{sp.emoji}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                        <span style={{ fontWeight: 600, fontSize: 14, color: "#1a1a1a" }}>{sp.name}</span>
                        {sp.priority && <span style={{ fontSize: 10, background: sp.accent, color: "#fff", padding: "2px 8px", borderRadius: 99, fontWeight: 700 }}>Priorität</span>}
                      </div>
                      <div style={{ fontSize: 12, color: "#888", marginTop: 1 }}>{sp.dose}</div>
                    </div>
                    <div style={s.spBdg(sp.accent)}>{sp.badge}</div>
                    <div style={s.chv}>{isOpen ? "▲" : "▼"}</div>
                  </div>
                  {isOpen && (
                    <div style={s.spB}>
                      <div style={{ marginTop: 10 }}>
                        <div style={{ fontSize: 10, fontWeight: 700, color: "#999", letterSpacing: "0.07em", textTransform: "uppercase", marginBottom: 3 }}>Wann & Wie</div>
                        <div style={{ fontSize: 13, color: "#555" }}>{sp.when}</div>
                      </div>
                      <div style={{ marginTop: 10 }}>
                        <div style={{ fontSize: 10, fontWeight: 700, color: "#999", letterSpacing: "0.07em", textTransform: "uppercase", marginBottom: 3 }}>Warum</div>
                        <div style={{ fontSize: 13, color: "#555", lineHeight: 1.7 }}>{sp.why}</div>
                      </div>
                      <div style={{ marginTop: 10, background: sp.compatWarn ? "#FEF3E2" : "#F0FAF5", borderRadius: 8, padding: "8px 11px", fontSize: 12, color: sp.compatWarn ? "#A04000" : "#1A6B45" }}>
                        {sp.compatWarn ? "⚠️ " : "✅ "}{sp.compat}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
