<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Ausgaben" />
  <title>Ausgaben</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231A1916'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-size='38'%3E%F0%9F%92%B0%3C/text%3E%3C/svg%3E" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%231A1916'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-size='110'%3E%F0%9F%92%B0%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F7F6F3;
      --surface:   #FFFFFF;
      --border:    #E8E6E1;
      --text:      #1A1916;
      --muted:     #9A9790;
      --accent:    #1A1916;
      --accent-fg: #FFFFFF;
      --success:   #2D6A4F;
      --success-bg:#D8F3DC;
      --radius:    16px;
      --shadow:    0 2px 16px rgba(0,0,0,0.06);
    }
    body.dark {
      --bg:        #1A1A1A;
      --surface:   #242424;
      --border:    #333;
      --text:      #ECECEC;
      --muted:     #686868;
      --accent:    #ECECEC;
      --accent-fg: #1A1A1A;
      --success:   #4CAF7D;
      --success-bg:#1A3D2B;
      --shadow:    0 2px 20px rgba(0,0,0,0.4);
    }

    body.dark .currency-symbol      { background: var(--bg); }
    body.dark .amount-display       { background: var(--bg); }
    body.dark #beschreibung         { background: var(--surface); }
    body.dark .quick-btn            { color: var(--text); }
    body.dark .mode-toggle          { color: var(--muted); }
    body.dark .cat-btn.active .icon { filter: brightness(0.1); }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
    }

    /* ══ DESKTOP LAYOUT ══ */
    .page {
      min-height: 100dvh;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .topbar { display: flex; align-items: center; justify-content: space-between; }
    .topbar-left { display: flex; align-items: baseline; gap: 12px; }
    .clock { font-family: 'DM Mono', monospace; font-size: 30px; font-weight: 500; letter-spacing: -0.02em; }
    .date-label { font-size: 13px; color: var(--muted); }

    .theme-toggle {
      width: 52px; height: 28px; background: var(--border);
      border: none; border-radius: 100px; cursor: pointer; position: relative;
      transition: background 0.35s; -webkit-tap-highlight-color: transparent;
    }
    .theme-toggle::after {
      content: '☀️'; position: absolute; top: 3px; left: 3px;
      width: 22px; height: 22px; border-radius: 50%; background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; line-height: 22px; text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    body.dark .theme-toggle { background: #444; }
    body.dark .theme-toggle::after { content: '🌙'; transform: translateX(24px); }

    .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
    .nav-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; }
    .nav-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      height: 46px; border: 1.5px solid var(--border); border-radius: 12px;
      background: var(--surface); font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500; color: var(--muted);
      text-decoration: none; transition: border-color 0.15s, color 0.15s;
    }
    .nav-btn:hover { border-color: var(--accent); color: var(--text); }

    /* ══ CARD ══ */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 24px; display: flex; flex-direction: column; gap: 20px;
    }
    label { font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); }

    /* ══ FORM ══ */
    .amount-label-row { display: flex; align-items: center; justify-content: space-between; }
    .mode-toggle {
      background: none; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 3px 10px; font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 500; color: var(--muted);
      cursor: pointer; transition: all 0.12s; -webkit-tap-highlight-color: transparent;
    }
    .mode-toggle:hover { border-color: var(--accent); color: var(--text); }
    .amount-block { display: flex; flex-direction: column; gap: 8px; }
    .amount-input-row {
      display: flex; align-items: center; border: 1.5px solid var(--border);
      border-radius: 12px; overflow: hidden; transition: border-color 0.15s;
    }
    .amount-input-row:focus-within { border-color: var(--accent); }
    .currency-symbol {
      padding: 0 14px; font-size: 20px; font-weight: 500;
      color: var(--muted); background: var(--bg);
      border-right: 1.5px solid var(--border);
      height: 52px; display: flex; align-items: center; user-select: none;
    }
    #betrag {
      flex: 1; border: none; outline: none; padding: 0 16px;
      font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500;
      color: var(--text); background: transparent; height: 52px; width: 100%;
      -webkit-appearance: none;
    }
    #betrag::placeholder { color: var(--border); }
    .amount-display {
      display: flex; align-items: center; border: 1.5px solid var(--border);
      border-radius: 12px; overflow: hidden; background: var(--bg);
    }
    .amount-display-value {
      flex: 1; padding: 0 16px; font-family: 'DM Mono', monospace;
      font-size: 22px; font-weight: 500; color: var(--text);
      height: 52px; display: flex; align-items: center;
    }
    .amount-display-value.empty { color: var(--border); }
    .quick-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .quick-btn {
      border: 1.5px solid var(--border); border-radius: 10px; background: transparent;
      padding: 10px 4px; font-family: 'DM Mono', monospace;
      font-size: 12px; font-weight: 500; color: var(--text); cursor: pointer;
      transition: all 0.1s; -webkit-tap-highlight-color: transparent; text-align: center;
    }
    .quick-btn:hover  { border-color: var(--accent); background: var(--bg); }
    .quick-btn:active { transform: scale(0.95); }
    .quick-btn.del-btn { font-size: 16px; color: var(--muted); }
    .quick-btn.del-btn:hover { color: #C0392B; border-color: #C0392B; background: #fdf0ee; }
    .amount-block[data-mode="keyboard"] .quick-grid,
    .amount-block[data-mode="keyboard"] .amount-display { display: none; }
    .amount-block[data-mode="buttons"]  .amount-input-row { display: none; }
    .cat-block { display: flex; flex-direction: column; gap: 8px; }
    .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
    .cat-btn {
      border: 1.5px solid var(--border); border-radius: 10px; background: transparent;
      padding: 9px 6px; font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 500; color: var(--text); cursor: pointer;
      transition: all 0.12s; display: flex; flex-direction: column;
      align-items: center; gap: 3px; -webkit-tap-highlight-color: transparent;
    }
    .cat-btn .icon { font-size: 17px; line-height: 1; }
    .cat-btn:hover { border-color: var(--accent); background: var(--bg); }
    .cat-btn.active { border-color: var(--accent); background: var(--accent); color: var(--accent-fg); }
    .cat-btn.active .icon { filter: brightness(5); }
    body.dark .cat-btn.active .icon { filter: brightness(0.1); }
    .suggestion-block { display: flex; flex-direction: column; gap: 8px; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      border: 1.5px solid var(--border); border-radius: 100px; background: transparent;
      padding: 6px 13px; font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 500; color: var(--text); cursor: pointer;
      transition: all 0.12s; -webkit-tap-highlight-color: transparent;
    }
    .chip:hover { border-color: var(--accent); background: var(--bg); }
    .chip.active { border-color: var(--accent); background: var(--accent); color: var(--accent-fg); }
    .desc-block { display: flex; flex-direction: column; gap: 8px; }
    #beschreibung {
      border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 16px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text);
      background: var(--surface); outline: none; resize: none;
      transition: border-color 0.15s; height: 52px; width: 100%;
      line-height: 1.5; -webkit-appearance: none; appearance: none;
      display: block; box-shadow: none;
    }
    #beschreibung::placeholder { color: var(--border); }
    #beschreibung:focus { border-color: var(--accent); }
    .submit-btn {
      width: 100%; border: none; border-radius: 12px;
      background: var(--accent); color: var(--accent-fg);
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
      height: 50px; cursor: pointer; transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .submit-btn:hover  { opacity: 0.85; }
    .submit-btn:active { transform: scale(0.98); }
    .field-error { font-size: 11px; color: #C0392B; margin-top: -4px; }
    .date-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }

    /* ══ WEATHER – DESKTOP ══ */
    .weather-col { display: flex; flex-direction: column; gap: 16px; }
    .w-hero { display: flex; align-items: flex-end; justify-content: space-between; }
    .w-temp-big { font-size: 58px; font-weight: 300; letter-spacing: -0.04em; line-height: 1; }
    .w-temp-big sup { font-size: 22px; font-weight: 400; vertical-align: super; }
    .w-condition { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .w-icon-big { font-size: 52px; line-height: 1; }
    .w-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .w-stat { display: flex; flex-direction: column; gap: 3px; }
    .w-stat-label { font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
    .w-stat-val   { font-size: 18px; font-weight: 500; font-family: 'DM Mono', monospace; }
    .w-stat-sub   { font-size: 11px; color: var(--muted); }
    .w-alerts { display: flex; flex-direction: column; gap: 7px; }
    .w-alert {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 500;
    }
    .w-alert.rain { background: #EBF4FF; color: #2563EB; }
    .w-alert.wind { background: #F0FFF4; color: #15803D; }
    .w-alert.uv   { background: #FFFBEB; color: #D97706; }
    .w-alert.uv.high { background: #FEF2F2; color: #DC2626; }
    body.dark .w-alert.rain { background: #1e3a5f; color: #93c5fd; }
    body.dark .w-alert.wind { background: #1a3a2a; color: #6ee7b7; }
    body.dark .w-alert.uv   { background: #3a2a10; color: #fcd34d; }
    body.dark .w-alert.uv.high { background: #3a1a1a; color: #fca5a5; }
    .w-hourly-title { font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .hourly-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .hourly-scroll::-webkit-scrollbar { display: none; }
    .hourly-item { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 42px; }
    .hourly-time { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }
    .hourly-bar-wrap { width: 22px; height: 64px; background: var(--bg); border-radius: 12px; overflow: hidden; display: flex; align-items: flex-end; border: 1px solid var(--border); }
    .hourly-bar-fill { width: 100%; border-radius: 12px; background: var(--border); transition: height 0.6s ease; }
    .hourly-bar-fill.rain { background: #93c5fd; }
    .hourly-temp { font-size: 11px; font-weight: 500; font-family: 'DM Mono', monospace; }
    .hourly-icon { font-size: 13px; }

    /* ══ WEATHER – MOBILE COMPACT ══ */
    .w-mobile-strip {
      display: none; /* hidden on desktop */
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 18px;
      flex-direction: column;
      gap: 12px;
    }
    .w-mobile-top {
      display: flex; align-items: center; justify-content: space-between;
    }
    .w-mobile-temp {
      font-size: 40px; font-weight: 300; letter-spacing: -0.03em; line-height: 1;
      font-family: 'DM Mono', monospace;
    }
    .w-mobile-temp sup { font-size: 16px; vertical-align: super; font-weight: 400; }
    .w-mobile-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .w-mobile-icon { font-size: 36px; line-height: 1; }
    .w-mobile-condition { font-size: 12px; color: var(--muted); }
    .w-mobile-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .w-mobile-stat { display: flex; flex-direction: column; gap: 1px; }
    .w-mobile-stat-label { font-size: 9px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
    .w-mobile-stat-val   { font-size: 15px; font-weight: 500; font-family: 'DM Mono', monospace; }
    .w-mobile-stat-sub   { font-size: 10px; color: var(--muted); }
    /* compact alerts */
    .w-mobile-alerts { display: flex; flex-direction: column; gap: 5px; }
    .w-mobile-alert {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 11px; border-radius: 8px; font-size: 12px; font-weight: 500;
    }
    .w-mobile-alert.rain { background: #EBF4FF; color: #2563EB; }
    .w-mobile-alert.wind { background: #F0FFF4; color: #15803D; }
    .w-mobile-alert.uv   { background: #FFFBEB; color: #D97706; }
    .w-mobile-alert.uv.high { background: #FEF2F2; color: #DC2626; }
    body.dark .w-mobile-alert.rain { background: #1e3a5f; color: #93c5fd; }
    body.dark .w-mobile-alert.wind { background: #1a3a2a; color: #6ee7b7; }
    body.dark .w-mobile-alert.uv   { background: #3a2a10; color: #fcd34d; }
    body.dark .w-mobile-alert.uv.high { background: #3a1a1a; color: #fca5a5; }
    /* compact hourly */
    .w-mobile-hourly { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
    .w-mobile-hourly::-webkit-scrollbar { display: none; }
    .w-mobile-hourly-item { display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 36px; }
    .w-mobile-hourly-time { font-size: 9px; color: var(--muted); font-family: 'DM Mono', monospace; }
    .w-mobile-hourly-icon { font-size: 14px; }
    .w-mobile-hourly-temp { font-size: 11px; font-weight: 500; font-family: 'DM Mono', monospace; }

    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ══ TRANSIT CARD ══ */
    .transit-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 18px 20px; display: flex; flex-direction: column; gap: 14px;
    }
    .transit-header {
      display: flex; align-items: center; justify-content: space-between;
    }
    .transit-title {
      font-size: 11px; font-weight: 500; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--muted);
    }
    .transit-updated { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; cursor: pointer; }
    .transit-updated:hover { color: var(--text); }
    .transit-station-name {
      font-size: 12px; font-weight: 600; color: var(--muted);
      letter-spacing: 0.05em; text-transform: uppercase;
      border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 2px;
    }
    .transit-dir-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; letter-spacing:0.03em; }
    .transit-dep-row {
      display: flex; align-items: center; gap: 8px; padding: 4px 0;
    }
    .t-badge {
      font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 700;
      padding: 2px 7px; border-radius: 5px; flex-shrink: 0; min-width: 34px; text-align: center;
    }
    .t-badge.u { background: #006CB4; color: #fff; }
    .t-badge.t { background: #C4161C; color: #fff; }
    body.dark .t-badge.u { background: #1A8AD4; }
    body.dark .t-badge.t { background: #E63840; }
    .t-dest { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .t-times { display: flex; gap: 5px; flex-shrink: 0; }
    .t-min {
      font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600;
      background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
      padding: 2px 6px; min-width: 36px; text-align: center; color: var(--text);
    }
    .t-min.now  { background: #1A9862; color: #fff; border-color: #1A9862; }
    .t-min.soon { background: #D97706; color: #fff; border-color: #D97706; }
    .t-hbf { font-size: 10px; color: var(--muted); }
    .t-divider { height: 1px; background: var(--border); margin: 4px 0; }
    .t-section { display: flex; flex-direction: column; gap: 2px; }

    /* ══ TOAST ══ */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--success-bg); color: var(--success);
      border: 1px solid #B7E4C7; border-radius: 100px;
      padding: 12px 22px; font-size: 14px; font-weight: 500;
      white-space: nowrap; opacity: 0; pointer-events: none;
      transition: opacity 0.25s, transform 0.25s; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ══ MOBILE COLLAPSE CARDS ══ */
    .m-collapse-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      flex-direction: column;
    }
    .m-collapse-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; cursor: pointer; gap: 10px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .m-collapse-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .m-collapse-icon { font-size: 18px; flex-shrink: 0; }
    .m-collapse-text {
      font-size: 14px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .m-collapse-chevron {
      font-size: 20px; color: var(--muted); flex-shrink: 0;
      transition: transform 0.25s ease; line-height: 1;
    }
    .m-collapse-chevron.open { transform: rotate(90deg); }
    .m-collapse-body {
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* ══ MOBILE OVERRIDES ══ */
    @media (max-width: 768px) {
      .page { padding: 16px 16px env(safe-area-inset-bottom, 32px); gap: 14px; }
      .columns { display: flex; flex-direction: column; gap: 14px; width: 100%; }
      .columns > * { width: 100%; min-width: 0; }
      .weather-col { display: none; }
      .w-mobile-strip { display: flex; }
      .clock { font-size: 22px; }
      .date-label { font-size: 11px; }
      .card { padding: 18px; gap: 16px; }
      .w-mobile-stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="clock" id="clock">00:00</span>
      <span class="date-label" id="date-label"></span>
    </div>
    <button class="theme-toggle" id="theme-toggle" aria-label="Dark mode toggle"></button>
  </div>

  <!-- Columns (desktop: 2-col, mobile: single col) -->
  <div class="columns">

    <!-- LEFT / ONLY on mobile: Expense form -->
    <div class="card">
      <div class="amount-block" id="amount-block">
        <div class="amount-label-row">
          <label for="betrag">Betrag</label>
          <button class="mode-toggle" id="mode-toggle">⌨ Tastatur</button>
        </div>

<script>
// ── Show mobile elements
function applyMobileLayout() {
  const mob = window.innerWidth <= 768;
  document.getElementById('mobile-nav').style.display          = mob ? 'grid' : 'none';
  document.getElementById('mobile-weather').style.display      = mob ? 'flex' : 'none';
  document.getElementById('mobile-transit-card').style.display = mob ? 'flex' : 'none';
}
applyMobileLayout();
window.addEventListener('resize', applyMobileLayout);

// ── Toggle mobile collapse cards
function toggleMobileCard(id) {
  const body    = document.getElementById(`mobile-${id}-body`);
  const chevron = document.getElementById(`mobile-${id}-chevron`);
  const isOpen  = !body.hidden;
  body.hidden   = isOpen;
  chevron.classList.toggle('open', !isOpen);
}

// ── Dark Mode
const themeToggle = document.getElementById('theme-toggle');
const oneDay = 24 * 60 * 60 * 1000;
function shouldBeDark() { const h = new Date().getHours(); return h >= 20 || h < 7; }
const saved = localStorage.getItem('theme');
const savedAt = parseInt(localStorage.getItem('themeSetAt') || '0');
if (saved && (Date.now() - savedAt) < oneDay) {
  if (saved === 'dark') document.body.classList.add('dark');
} else {
  if (shouldBeDark()) document.body.classList.add('dark');
  localStorage.removeItem('theme');
}
themeToggle.addEventListener('click', () => {
  document.body.classList.toggle('dark');
  localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
  localStorage.setItem('themeSetAt', Date.now().toString());
});
setInterval(() => {
  const s = localStorage.getItem('theme');
  const t = parseInt(localStorage.getItem('themeSetAt') || '0');
  if (!s || (Date.now() - t) >= oneDay) {
    if (shouldBeDark()) document.body.classList.add('dark');
    else document.body.classList.remove('dark');
  }
}, 60000);

// ── Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('date-label').textContent =
    now.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });
}
updateClock();
setInterval(updateClock, 10000);

// ── Weather helpers
const WMO = {
  0:'Klarer Himmel',1:'Überwiegend klar',2:'Teilweise bewölkt',3:'Bewölkt',
  45:'Nebel',48:'Reifnebel',51:'Leichter Nieselregen',53:'Nieselregen',55:'Starker Nieselregen',
  61:'Leichter Regen',63:'Regen',65:'Starker Regen',71:'Leichter Schneefall',73:'Schneefall',
  75:'Starker Schneefall',80:'Leichte Schauer',81:'Schauer',82:'Starke Schauer',
  95:'Gewitter',96:'Gewitter mit Hagel',99:'Starkes Gewitter'
};
const WMO_ICON = {
  0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',
  51:'🌦',53:'🌧',55:'🌧',61:'🌧',63:'🌧',65:'🌧',
  71:'🌨',73:'❄️',75:'❄️',80:'🌦',81:'🌧',82:'⛈',
  95:'⛈',96:'⛈',99:'⛈'
};
function uvLabel(uv) {
  if (uv <= 2) return { text:'Niedrig', high:false };
  if (uv <= 5) return { text:'Mittel',  high:false };
  if (uv <= 7) return { text:'Hoch',    high:true  };
  if (uv <= 10)return { text:'Sehr hoch',high:true };
  return { text:'Extrem', high:true };
}

function windDirArrow(deg) {
  // Arrow points in the direction wind is blowing TO
  const dirs = ['↑','↗','→','↘','↓','↙','←','↖'];
  return dirs[Math.round(deg / 45) % 8];
}

async function loadWeather() {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=48.1374&longitude=11.5755' +
      '&current=temperature_2m,weathercode,windspeed_10m,winddirection_10m,uv_index,precipitation' +
      '&hourly=temperature_2m,precipitation_probability,weathercode' +
      '&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,weathercode' +
      '&timezone=Europe%2FBerlin&forecast_days=2';
    const res  = await fetch(url);
    const data = await res.json();

    const cur    = data.current;
    const daily  = data.daily;
    const hourly = data.hourly;
    const curHour = new Date().getHours();

    const rainToday    = daily.precipitation_probability_max[0];
    const rainTomorrow = daily.precipitation_probability_max[1];
    const rainSum      = daily.precipitation_sum[0];
    const wind         = Math.round(cur.windspeed_10m);
    const windDir      = cur.winddirection_10m || 0;
    const windArrow    = windDirArrow(windDir);
    const uv           = Math.round(cur.uv_index);
    const uvL          = uvLabel(uv);
    const tMax         = Math.round(daily.temperature_2m_max[0]);
    const tMin         = Math.round(daily.temperature_2m_min[0]);
    const tempNow      = Math.round(cur.temperature_2m);
    const wCode        = cur.weathercode;

    const hStart = hourly.time.findIndex(t => new Date(t).getHours() === curHour);
    const hTemps = hourly.temperature_2m.slice(hStart, hStart + 13);
    const hProbs = hourly.precipitation_probability.slice(hStart, hStart + 13);
    const hCodes = hourly.weathercode.slice(hStart, hStart + 13);
    const hTimes = hourly.time.slice(hStart, hStart + 13);
    const maxTemp  = Math.max(...hTemps);
    const minTemp  = Math.min(...hTemps);
    const tRange   = maxTemp - minTemp || 1;

    // ── DESKTOP weather (full)
    let html = '';
    html += `<div class="w-hero">
      <div>
        <div class="w-temp-big">${tempNow}<sup>°C</sup></div>
        <div class="w-condition">${WMO[wCode]||'—'} · München</div>
      </div>
      <div class="w-icon-big">${WMO_ICON[wCode]||'🌡'}</div>
    </div>
    <div class="w-stats">
      <div class="w-stat"><span class="w-stat-label">Hoch</span><span class="w-stat-val">${tMax}°</span><span class="w-stat-sub">Tief ${tMin}°</span></div>
      <div class="w-stat"><span class="w-stat-label">Wind</span><span class="w-stat-val">${windArrow} ${wind}</span><span class="w-stat-sub">km/h</span></div>
      <div class="w-stat"><span class="w-stat-label">UV</span><span class="w-stat-val">${uv}</span><span class="w-stat-sub">${uvL.text}</span></div>
      <div class="w-stat"><span class="w-stat-label">Regen heute</span><span class="w-stat-val">${rainToday}%</span><span class="w-stat-sub">${rainSum>0?rainSum.toFixed(1)+' mm':'kein'}</span></div>
    </div>
    <div class="w-alerts">`;
    if (rainToday >= 30)    html += `<div class="w-alert rain">🌧 Heute Regen möglich · ${rainToday}%${rainSum>0?' · '+rainSum.toFixed(1)+' mm':''}</div>`;
    if (rainTomorrow >= 30) html += `<div class="w-alert rain">🌧 Morgen Regen möglich · ${rainTomorrow}%</div>`;
    if (rainToday < 30 && rainTomorrow < 30) html += `<div class="w-alert wind" style="background:var(--bg);color:var(--muted)">✅ Kein Regen heute oder morgen</div>`;
    if (wind >= 30)         html += `<div class="w-alert wind">💨 Wind · ${wind} km/h</div>`;
    html += `<div class="w-alert uv ${uvL.high?'high':''}">🌞 UV ${uv} · ${uvL.text}${uvL.high?' · Sonnenschutz!':''}</div></div>`;
    html += `<div>
      <button onclick="this.nextElementSibling.hidden=!this.nextElementSibling.hidden;this.textContent=this.nextElementSibling.hidden?'▼ Stundenansicht anzeigen':'▲ Stundenansicht einklappen'"
        style="font-size:12px;font-weight:500;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 0;font-family:inherit;transition:color 0.15s"
        onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">
        ▼ Stundenansicht anzeigen
      </button>
      <div hidden style="margin-top:10px"><div class="hourly-scroll">`;
    hTemps.forEach((temp,i) => {
      const h = new Date(hTimes[i]).getHours();
      const label = i===0?'Jetzt':h+':00';
      const isRain = hProbs[i]>=30;
      const barH = Math.round(((temp-minTemp)/tRange)*48+10);
      html += `<div class="hourly-item">
        <span class="hourly-time">${label}</span>
        <div class="hourly-bar-wrap"><div class="hourly-bar-fill${isRain?' rain':''}" style="height:${barH}px"></div></div>
        <span class="hourly-temp">${Math.round(temp)}°</span>
        <span class="hourly-icon">${WMO_ICON[hCodes[i]]||'🌡'}</span>
      </div>`;
    });
    html += `</div></div></div>`;
    document.getElementById('weather-skeleton').hidden = true;
    const wc = document.getElementById('weather-content');
    wc.innerHTML = html; wc.hidden = false;

    // ── MOBILE weather (compact)
    let mhtml = '';
    // Top row: temp + icon + condition
    mhtml += `<div class="w-mobile-top">
      <div>
        <div class="w-mobile-temp">${tempNow}<sup>°</sup></div>
        <div class="w-mobile-condition">${WMO[wCode]||'—'} · München</div>
      </div>
      <div class="w-mobile-right">
        <div class="w-mobile-icon">${WMO_ICON[wCode]||'🌡'}</div>
      </div>
    </div>`;
    // Stats row
    mhtml += `<div class="w-mobile-stats">
      <div class="w-mobile-stat"><span class="w-mobile-stat-label">Hoch/Tief</span><span class="w-mobile-stat-val">${tMax}°/${tMin}°</span></div>
      <div class="w-mobile-stat"><span class="w-mobile-stat-label">Wind</span><span class="w-mobile-stat-val">${windArrow} ${wind} km/h</span></div>
      <div class="w-mobile-stat"><span class="w-mobile-stat-label">UV</span><span class="w-mobile-stat-val">${uv} <span style="font-size:10px;font-family:sans-serif;font-weight:400">${uvL.text}</span></span></div>
      <div class="w-mobile-stat"><span class="w-mobile-stat-label">Regen</span><span class="w-mobile-stat-val">${rainToday}%</span></div>
    </div>`;
    // Compact alerts
    const alerts = [];
    if (rainToday >= 30)    alerts.push(`<div class="w-mobile-alert rain">🌧 Regen heute · ${rainToday}%</div>`);
    if (rainTomorrow >= 30) alerts.push(`<div class="w-mobile-alert rain">🌧 Regen morgen · ${rainTomorrow}%</div>`);
    if (wind >= 30)         alerts.push(`<div class="w-mobile-alert wind">💨 Wind · ${wind} km/h</div>`);
    if (uvL.high)           alerts.push(`<div class="w-mobile-alert uv${uvL.high?' high':''}">🌞 UV ${uv} · Sonnenschutz!</div>`);
    if (alerts.length > 0)  mhtml += `<div class="w-mobile-alerts">${alerts.join('')}</div>`;
    // Collapsible hourly
    mhtml += `<div>
      <button onclick="this.nextElementSibling.hidden=!this.nextElementSibling.hidden;this.textContent=this.nextElementSibling.hidden?'▼ Stundenansicht anzeigen':'▲ Stundenansicht einklappen'"
        style="font-size:12px;font-weight:500;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 0;font-family:inherit">
        ▼ Stundenansicht anzeigen
      </button>
      <div hidden style="margin-top:8px"><div class="w-mobile-hourly">`;
    hTemps.slice(0, 12).forEach((temp,i) => {
      const h = new Date(hTimes[i]).getHours();
      const label = i===0?'Jetzt':h+':00';
      mhtml += `<div class="w-mobile-hourly-item">
        <span class="w-mobile-hourly-time">${label}</span>
        <span class="w-mobile-hourly-icon">${WMO_ICON[hCodes[i]]||'🌡'}</span>
        <span class="w-mobile-hourly-temp">${Math.round(temp)}°</span>
      </div>`;
    });
    mhtml += `</div></div></div>`;
    document.getElementById('mobile-skeleton').hidden = true;
    const mwc = document.getElementById('mobile-weather-content');
    mwc.innerHTML = mhtml; mwc.hidden = false;
    // Update collapsed pill
    const pill = document.getElementById('mobile-weather-pill');
    if (pill) pill.textContent = `${tempNow}° ${WMO_ICON[wCode]||''} ${WMO[wCode]||''}`;
    const pillIcon = document.querySelector('#mobile-weather-header .m-collapse-icon');
    if (pillIcon) pillIcon.textContent = WMO_ICON[wCode] || '🌡';

  } catch(e) {
    document.getElementById('weather-skeleton').innerHTML =
      `<p style="font-size:13px;color:var(--muted);padding:8px 0">Wetterdaten nicht verfügbar.</p>`;
    document.getElementById('mobile-skeleton').innerHTML =
      `<p style="font-size:12px;color:var(--muted)">Wetter nicht verfügbar.</p>`;
  }
}
setTimeout(loadWeather, 0);

// ── Expense Form
const SUGGESTIONS = {
  'Essen':    null,
  'Fast-Food': [
    {label:'McDonalds',icon:'🍟'},{label:'Burger King',icon:'👑'},
    {label:'Pizza',icon:'🍕'},{label:'Asiate',icon:'🥡'},
    {label:'Döner',icon:'🌯'},{label:'Bäcker',icon:'🥐'},
    {label:'Sonstige Snacks',icon:'🍿'},
  ],
  'Trinken': [{label:'Softdrink',icon:'🥤'},{label:'Alkohol',icon:'🍺'}],
  'Drogerie': null, 'Digitale': [], 'Sonstige': [],
};
const AUTO_DESC = { 'Drogerie': 'Drogerie' };

const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
let mode = isTouchDevice ? 'buttons' : 'keyboard';
const amountBlock  = document.getElementById('amount-block');
const modeToggle   = document.getElementById('mode-toggle');
const displayValue = document.getElementById('amount-display-value');
const betragInput  = document.getElementById('betrag');
let accCents = 0;

function setMode(m) {
  mode = m; amountBlock.dataset.mode = m;
  modeToggle.textContent = m === 'buttons' ? '⌨ Tastatur' : '# Schnell';
}
setMode(mode);

modeToggle.addEventListener('click', () => {
  const next = mode === 'buttons' ? 'keyboard' : 'buttons';
  if (next === 'keyboard' && accCents > 0) betragInput.value = (accCents / 100).toFixed(2);
  if (next === 'buttons') {
    const p = parseFloat(betragInput.value);
    if (!isNaN(p) && p > 0) { accCents = Math.round(p * 100); updateAmtDisplay(); }
  }
  setMode(next);
});

function updateAmtDisplay() {
  if (accCents === 0) { displayValue.textContent = '0,00'; displayValue.classList.add('empty'); }
  else { displayValue.textContent = (accCents/100).toFixed(2).replace('.',','); displayValue.classList.remove('empty'); }
}

document.querySelectorAll('.quick-btn[data-val]').forEach(btn => {
  btn.addEventListener('click', () => {
    accCents += Math.round(parseFloat(btn.dataset.val) * 100);
    updateAmtDisplay();
    document.getElementById('betrag-err').hidden = true;
  });
});
document.getElementById('del-btn').addEventListener('click', () => { accCents = 0; updateAmtDisplay(); });

const today  = new Date();
const dayNum = today.getDate();
document.getElementById('today-display').textContent =
  today.toLocaleDateString('de-DE', { day:'numeric', month:'long', year:'numeric' });

let selectedCat = null, selectedChip = null;
const suggestionBlock = document.getElementById('suggestion-block');
const chipRow         = document.getElementById('chip-row');
const descBlock       = document.getElementById('desc-block');
const beschreibung    = document.getElementById('beschreibung');

document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedCat = btn.dataset.cat; selectedChip = null;
    document.getElementById('cat-err').hidden = true;
    updateDescUI();
  });
});

function updateDescUI() {
  const suggestions = SUGGESTIONS[selectedCat];
  chipRow.innerHTML = ''; selectedChip = null;
  beschreibung.value = ''; beschreibung.removeAttribute('readonly');
  if (selectedCat === 'Essen' || selectedCat === 'Drogerie') {
    suggestionBlock.hidden = true; descBlock.hidden = true; return;
  }
  if (suggestions && suggestions.length > 0) {
    suggestionBlock.hidden = false; descBlock.hidden = false;
    suggestions.forEach(({label, icon}) => {
      const chip = document.createElement('button');
      chip.className = 'chip'; chip.innerHTML = `${icon} ${label}`;
      chip.addEventListener('click', () => {
        if (selectedChip === label) {
          chip.classList.remove('active'); selectedChip = null;
          beschreibung.value = ''; descBlock.hidden = false;
        } else {
          document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active'); selectedChip = label;
          beschreibung.value = label; descBlock.hidden = true;
        }
      });
      chipRow.appendChild(chip);
    });
    return;
  }
  suggestionBlock.hidden = true; descBlock.hidden = false;
}

document.getElementById('submit-btn').addEventListener('click', () => {
  let valid = true;
  let betragNum = mode === 'keyboard' ? parseFloat(betragInput.value) : accCents / 100;
  if (!betragNum || isNaN(betragNum) || betragNum <= 0) {
    document.getElementById('betrag-err').hidden = false; valid = false;
  } else { document.getElementById('betrag-err').hidden = true; }
  if (!selectedCat) {
    document.getElementById('cat-err').hidden = false; valid = false;
  } else { document.getElementById('cat-err').hidden = true; }
  if (!valid) return;

  let desc = '';
  if (AUTO_DESC[selectedCat]) desc = AUTO_DESC[selectedCat];
  else if (selectedCat !== 'Essen') desc = beschreibung.value.trim() || '';

  const betrag = betragNum.toFixed(2).replace('.', ',');
  const base   = 'https://docs.google.com/forms/d/e/1FAIpQLSdJBCSdlctmVTxIrMywL6HysqsfINqAgEtve3icHsYp2tpUUg/formResponse';

  let iframe = document.getElementById('submit-frame');
  if (!iframe) {
    iframe = document.createElement('iframe');
    iframe.id = 'submit-frame'; iframe.name = 'submit-frame';
    iframe.style.display = 'none'; document.body.appendChild(iframe);
  }
  const form = document.createElement('form');
  form.method = 'POST'; form.action = base; form.target = 'submit-frame';
  [['entry.26907830',betrag],['entry.514198582',desc],
   ['entry.1689769809',selectedCat],['entry.1969182734',String(dayNum)]
  ].forEach(([name,value]) => {
    const inp = document.createElement('input');
    inp.type='hidden'; inp.name=name; inp.value=value; form.appendChild(inp);
  });
  document.body.appendChild(form); form.submit(); document.body.removeChild(form);

  setTimeout(() => {
    betragInput.value=''; accCents=0; updateAmtDisplay();
    beschreibung.value=''; beschreibung.removeAttribute('readonly');
    chipRow.innerHTML=''; suggestionBlock.hidden=true; descBlock.hidden=true;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    selectedCat=null; selectedChip=null;
    showToast();
  }, 300);
});

// ── Transit / MVG
// globalIds: Stiglmaierplatz U-Bahn = de:09162:540, Sandstraße Tram = de:09162:542
// Travel times from these stations to Hbf (U-Bahn: ~3min, Tram 16/17: ~6min)
const STATIONS = [
  {
    name: 'Stiglmaierplatz',
    query: 'Stiglmaierplatz',
    type: 'UBAHN',
    badge: 'u',
    inward:  { label: '→ Stadt · Hbf', hbfMin: 3,  filter: d => d.label==='U1' && isInward_U1(d.destination) },
    outward: { label: '→ Stadtauswärts',            filter: d => d.label==='U1' && !isInward_U1(d.destination) },
  },
  {
    name: 'Sandstraße',
    query: 'Sandstraße',
    type: 'TRAM',
    badge: 't',
    inward:  { label: '→ Stadt · Hbf', hbfMin: 6,  filter: d => (d.label==='16'||d.label==='17') && isInward_Tram(d.destination) },
    outward: { label: '→ Stadtauswärts',            filter: d => (d.label==='16'||d.label==='17') && !isInward_Tram(d.destination) },
  },
];

// U1 inward destinations (toward city center / Hbf)
function isInward_U1(dest) {
  const inwardTermini = ['Hauptbahnhof','Mangfallplatz','Ostbahnhof','Riem','Messestadt','Fröttmaning','Garching'];
  return inwardTermini.some(t => dest && dest.includes(t));
}

// Tram 16/17 inward = toward Hbf / Stachus / Scheidplatz direction
function isInward_Tram(dest) {
  const inwardTermini = ['Hauptbahnhof','Stachus','Scheidplatz','Romanplatz','St.','Amalienburg'];
  return inwardTermini.some(t => dest && dest.includes(t));
}

function fmtMin(depTimestampMs) {
  const diff = Math.round((depTimestampMs - Date.now()) / 60000);
  if (diff <= 0) return { label: 'Jetzt', cls: 'now' };
  if (diff <= 4)  return { label: diff + ' min', cls: 'soon' };
  return { label: diff + ' min', cls: '' };
}

const WORKER_URL = 'https://mvg-proxy.oskarherkt.workers.dev';

async function mvgFetch(url) {
  const res = await fetch(`${WORKER_URL}/?url=${encodeURIComponent(url)}`, {
    signal: AbortSignal.timeout(8000)
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}

// Cache station IDs
const stationIdCache = {};

async function resolveStationId(query) {
  if (stationIdCache[query]) return stationIdCache[query];
  const locations = await mvgFetch(`https://www.mvg.de/api/fib/v2/location?query=${encodeURIComponent(query)}`);
  if (!Array.isArray(locations) || locations.length === 0) throw new Error('Station not found: ' + query);
  // Pick first result that is a station
  const station = locations.find(l => l.type === 'STATION' || l.globalId) || locations[0];
  const id = station.globalId || station.id;
  if (!id) throw new Error('No globalId for ' + query);
  stationIdCache[query] = id;
  return id;
}

async function fetchDepartures(station) {
  const globalId = await resolveStationId(station.query);
  const data = await mvgFetch(
    `https://www.mvg.de/api/fib/v2/departure?globalId=${globalId}&limit=20&transportTypes=${station.type}`
  );
  return Array.isArray(data) ? data : (data.departures || data);
}

function renderStation(station, deps) {
  const inDeps  = deps.filter(station.inward.filter).slice(0, 3);
  const outDeps = deps.filter(station.outward.filter).slice(0, 2);

  let html = `<div class="transit-station-name">${station.name}</div>`;

  // Inward
  html += `<div class="t-section">`;
  html += `<div class="transit-dir-label">${station.inward.label}</div>`;
  if (inDeps.length === 0) {
    html += `<div style="font-size:12px;color:var(--muted);padding:4px 0">Keine Abfahrten</div>`;
  } else {
    inDeps.forEach(d => {
      const raw = d.realtimeDepartureTime || d.plannedDepartureTime || 0;
      const depMs = raw > 1e10 ? raw : raw * 1000; // handle both ms and seconds
      const { label, cls } = fmtMin(depMs);
      const hbfArr = new Date(depMs + station.inward.hbfMin * 60000);
      const hbfStr = hbfArr.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      html += `<div class="transit-dep-row">
        <span class="t-badge ${station.badge}">${d.label}</span>
        <span class="t-dest">${d.destination}</span>
        <span class="t-times">
          <span class="t-min ${cls}">${label}</span>
        </span>
        <span class="t-hbf">Hbf ~${hbfStr}</span>
      </div>`;
    });
  }
  html += `</div>`;

  // Divider
  html += `<div class="t-divider"></div>`;

  // Outward
  html += `<div class="t-section">`;
  html += `<div class="transit-dir-label">${station.outward.label}</div>`;
  if (outDeps.length === 0) {
    html += `<div style="font-size:12px;color:var(--muted);padding:4px 0">Keine Abfahrten</div>`;
  } else {
    outDeps.forEach(d => {
      const raw = d.realtimeDepartureTime || d.plannedDepartureTime || 0;
      const depMs = raw > 1e10 ? raw : raw * 1000;
      const { label, cls } = fmtMin(depMs);
      html += `<div class="transit-dep-row">
        <span class="t-badge ${station.badge}">${d.label}</span>
        <span class="t-dest">${d.destination}</span>
        <span class="t-times"><span class="t-min ${cls}">${label}</span></span>
      </div>`;
    });
  }
  html += `</div>`;

  return html;
}

async function loadTransit() {
  const content = document.getElementById('transit-content');
  const updated = document.getElementById('transit-updated');
  updated.textContent = '⟳ lädt…';

  try {
    const results = await Promise.all(
      STATIONS.map(s => fetchDepartures(s))
    );

    let html = '';
    STATIONS.forEach((s, i) => {
      if (i > 0) html += `<div class="t-divider" style="margin:10px 0"></div>`;
      const deps = results[i];
      html += renderStation(s, Array.isArray(deps) ? deps : (deps.departures || []));
    });

    content.innerHTML = html;
    const now = new Date();
    const timeStr = now.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    updated.textContent = `Aktualisiert ${timeStr} · klicken`;

    // Also render to mobile
    const mContent = document.getElementById('mobile-transit-content');
    const mUpdated = document.getElementById('mobile-transit-updated');
    if (mContent) mContent.innerHTML = html;

    // Update mobile pill: show next inward departure for each station
    const pill = document.getElementById('mobile-transit-pill');
    if (pill) {
      const parts = [];
      STATIONS.forEach((s, i) => {
        const deps = results[i] || [];
        const next = deps.filter(s.inward.filter)[0];
        if (next) {
          const raw = next.realtimeDepartureTime || next.plannedDepartureTime || 0;
          const depMs = raw > 1e10 ? raw : raw * 1000;
          const diff = Math.round((depMs - Date.now()) / 60000);
          const timeLabel = diff <= 0 ? 'Jetzt' : diff + ' min';
          const badge = s.badge === 'u' ? 'U1' : (next.label || '');
          parts.push(`${badge} ${timeLabel}`);
        }
      });
      pill.textContent = parts.length > 0 ? parts.join(' · ') : 'ÖPNV Live';
    }
  } catch(e) {
    content.innerHTML = `<div style="font-size:12px;color:var(--muted);padding:8px 0">
      ⚙️ Cloudflare Worker nicht konfiguriert<br>
      <span style="font-size:11px">Siehe Setup-Anleitung im Code · WORKER_URL anpassen</span>
    </div>`;
    updated.textContent = 'Fehler · erneut klicken';
    const mContent = document.getElementById('mobile-transit-content');
    const mUpdated = document.getElementById('mobile-transit-updated');
    if (mContent) mContent.innerHTML = `<div style="font-size:12px;color:var(--muted);padding:4px 0">⚙️ Worker nicht konfiguriert</div>`;
    if (mUpdated) mUpdated.textContent = 'Fehler · erneut klicken';
  }
}

// Load on start, refresh every 30s
loadTransit();
setInterval(loadTransit, 30000);

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
